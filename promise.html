<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💌 Daily Promises</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: white;
  color: #b30000;
  min-height: 100vh;
  position: relative;
}
body::before {
  content: "❤";
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 40rem;
  color: rgba(179,0,0,0.08);
  transform: translate(-50%, -50%);
  z-index: -1;
}
h1 { color: #b30000; margin-top: 30px; animation: pulse 2s infinite; }
@keyframes pulse {0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
textarea { 
  padding:10px; 
  width:70%; 
  height:100px; 
  border-radius:8px; 
  border:2px solid #b30000; 
}
button { 
  padding:10px 20px; 
  background:#b30000; 
  color:white; 
  border:none; 
  border-radius:8px; 
  cursor:pointer; 
  margin-top:10px; 
  transition:.3s; 
}
button:hover { 
  background:white; 
  color:#b30000; 
  border:2px solid #b30000; 
}
#status { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>
<h1>💌 Daily Promises</h1>
<textarea id="promiseText" placeholder="Write your promise... 💖"></textarea><br>
<button onclick="saveItem()">Save Promise 💖</button>
<p id="status"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const currentUserId = localStorage.getItem("loveUserId");
const currentUser = localStorage.getItem("loveUser");

async function saveItem() {
  const text = document.getElementById("promiseText").value.trim();
  if(!text) return alert("Please type your promise!");

  // ✅ Save to Supabase Love Vault
  const { error } = await supabase.from("love_vault").insert([{
    user_id: currentUserId,
    source_page: "Promises",
    section: "Promises",
    content: text,
    created_at: new Date().toISOString()
  }]);

  if(error){
    console.error(error);
    document.getElementById("status").innerHTML = "❌ Failed to save to Love Vault";
    return;
  }

  // ✅ Also keep in localStorage for offline access
  const vault = JSON.parse(localStorage.getItem("vault")) || [];
  vault.push({ 
    source_page: "Promises",
    section: "Promises",
    content: text,
    created_at: new Date().toISOString(),
    user_id: currentUserId,
    author: currentUser || "Anonymous"
  });
  localStorage.setItem("vault", JSON.stringify(vault));

  document.getElementById("promiseText").value = "";
  document.getElementById("status").innerHTML = `
    Promise saved to Love Vault 💌 <br>
    <button onclick="goHome()">⬅️ Back to Home</button>
  `;
}

function goHome() {
  window.location.href = "home.html"; 
}
</script>
</body>
</html>
