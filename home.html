<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GORATA AND LESLY'S LOVE HUB💕</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      margin: 0;
      padding: 0;
      background: white;
      color: #b30000;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "❤";
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 40rem;
      color: rgba(179, 0, 0, 0.08);
      transform: translate(-50%, -50%);
      z-index: -1;
    }

    h1 {
      color: #b30000;
      margin-top: 30px;
      font-size: 2.5rem;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    p { font-size: 18px; }

    .container { max-width: 500px; margin: auto; }

    a { 
      display: block; 
      margin: 15px; 
      text-decoration: none; 
      color: white; 
      background: #b30000; 
      padding: 12px; 
      border-radius: 10px; 
      width: 220px; 
      margin-left: auto; 
      margin-right: auto; 
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover { 
      background: white; 
      color: #b30000; 
      border: 2px solid #b30000;
      transform: scale(1.05); 
    }

    a[href="vault.html"] {
      background: #e60000;
      box-shadow: 0 0 15px rgba(230, 0, 0, 0.6);
    }

    #notify {
      margin-top: 20px;
      font-weight: bold;
      color: #b30000;
    }

    button {
      background: #b30000;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 25px;
      font-size: 1rem;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: #b30000;
      border: 2px solid #b30000;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GORATA AND LESLY'S LOVE HUB💕</h1>
    <p>Let’s play, write, and dream together 🌹</p>

    <!-- 🔗 Supabase will inject links here -->
    <div id="links"></div>

    <p id="notify"></p>
    <button onclick="logout()">Logout 🔒</button>
  </div>

  <!-- Supabase + Script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Redirect if not logged in
    if (!localStorage.getItem("loveLogin")) {
      window.location.href = "index.html";
    }

    // Supabase setup
    const supabaseUrl = "https://ietfunnecbuxrnsmxcyc.supabase.co"; // ✅ remove /rest/v1/
    const supabaseKey = "sb_publishable_oAiBSi-KMQDfAoKT7zGLgw_tdutSjlF"; // your anon key
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 🔗 Load links from Supabase
    async function loadLinks() {
      const { data, error } = await supabaseClient
        .from("sections")
        .select("*")
        .order("created_at");

      if (error) {
        console.error(error);
        return;
      }

      const linksDiv = document.getElementById("links");
      linksDiv.innerHTML = data.map(item =>
        `<a href="${item.url}">${item.name}</a>`
      ).join("");
    }

    // Vault notifications
    supabaseClient
      .channel("love-vault")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "love_vault" }, payload => {
        document.getElementById("notify").innerText = "✨ New update added! Check the Vault 💕";
      })
      .subscribe();

    function logout() {
      localStorage.removeItem("loveLogin");
      window.location.href = "index.html";
    }

    // Run on page load
    loadLinks();
  </script>
</body>
</html>
