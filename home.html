  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAI-xop8tZ71-UDuG9rCH0dy72-FheWFwE",
      authDomain: "love-hub-b4dbd.firebaseapp.com",
      projectId: "love-hub-b4dbd",
      storageBucket: "love-hub-b4dbd.firebasestorage.app",
      messagingSenderId: "804508115256",
      appId: "1:804508115256:web:611e1671d62c7b5a48e1cd",
      measurementId: "G-D5QQ523R5L"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // Register service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/firebase-messaging-sw.js")
        .then(reg => console.log("Service Worker registered:", reg))
        .catch(err => console.error("Service Worker error:", err));
    }

    // Request permission and get token
    Notification.requestPermission().then(permission => {
      if (permission === "granted") {
        getToken(messaging, { vapidKey: "BOP4pkLGY7Tk0tALGsuxRL6-57DjrGgeHIFvlvcKWJDz_6D3U9b8-qAacE6TaHU1K9-GxBJEerybyKlpvhH8LM" })
          .then(token => {
            console.log("FCM Token:", token);

            // 👉 Subscribe to topics (aligns with your campaigns)
            fetch("/subscribe", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token, topic: "app_general" })
            });

            fetch("/subscribe", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token, topic: "not_completed" })
            });
          })
          .catch(err => console.error("Token error:", err));
      }
    });

    // Handle incoming messages
    onMessage(messaging, payload => {
      console.log("Message received:", payload);
      new Notification(payload.notification.title, {
        body: payload.notification.body
      });
    });
  </script>
