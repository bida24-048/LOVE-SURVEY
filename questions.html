    text-align: center; 
    background: white; 
    color: #b30000; 
    min-height: 100vh; 
    position: relative;
    padding: 20px;
  }
  body::before {
    content: "❤";
    position: fixed;
    top: 50%;
    left: 50%;
    font-size: 40rem;
    color: rgba(179,0,0,0.08);
    transform: translate(-50%,-50%);
    z-index: -1;
  }
  h1 { 
    color: #b30000; 
    animation: pulse 2s infinite; 
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  h3 { color: #b30000; margin: 20px 0; font-size: 1.5rem; }
  button { 
    margin: 10px; 
    padding: 12px 24px; 
    border: none; 
    border-radius: 8px; 
    font-size: 16px; 
    cursor: pointer; 
    transition: 0.3s;
  }
  .yes { background: #b30000; color: white; }
  .yes:hover { background: white; color: #b30000; border: 2px solid #b30000; }
  .no { background: #ff4d4d; color: white; }
  .no:hover { background: white; color: #ff4d4d; border: 2px solid #ff4d4d; }
  .reset-btn { background: #ff9800; color: white; margin-top: 20px; margin-left: 10px; }
  .reset-btn:hover { background: white; color: #ff9800; border: 2px solid #ff9800; }
  .back-btn { background: #666; color: white; margin-top: 20px; }
  .back-btn:hover { background: white; color: #666; border: 2px solid #666; }
  #status { margin-top: 10px; font-weight: bold; }
  .progress { margin: 20px 0; font-size: 14px; color: #666; }
</style>
</head>

<div class="progress" id="progress"></div>

<div>
  <button class="yes" onclick="saveLoveAnswer('Yes')">Yes ✅</button>
  <button class="no" onclick="saveLoveAnswer('No')">No ❌</button>

<p id="status"></p>

<div>

const MAX_PER_DAY = 5;
let currentQuestion = questions[Math.floor(Math.random() * questions.length)];
let todayAnswers = [];

/* ================= LOAD TODAY ================= */
function loadTodayAnswers() {
  const today = new Date().toLocaleDateString();
  const saved = localStorage.getItem(`questions_${today}`);
  todayAnswers = saved ? JSON.parse(saved) : [];

  updateUI();
}

/* ================= UPDATE UI ================= */
function updateUI() {
  const remaining = MAX_PER_DAY - todayAnswers.length;

  document.getElementById("progress").innerHTML =
    `📊 ${todayAnswers.length} of ${MAX_PER_DAY} answered<br>` +
    (remaining > 0 ? `${remaining} more to go 💖` : "🎉 Complete! 🎉");

  // ✅ IF DONE: STOP EVERYTHING
  if (todayAnswers.length >= MAX_PER_DAY) {
    document.getElementById("question").innerHTML =
      "🎉 You've completed today's questions! 💖";

    document.getElementById("status").innerHTML =
      "Come back tomorrow for more 💌";

    // ✅ HIDE YES/NO BUTTONS
    document.querySelector(".yes").style.display = "none";
    document.querySelector(".no").style.display = "none";

    return;
  }

  // ✅ otherwise show current question
  document.getElementById("question").innerHTML = currentQuestion;
}

/* ================= SAVE ANSWER ================= */
function saveLoveAnswer(selectedAnswer) {
  loadTodayAnswers();

  if (todayAnswers.length >= MAX_PER_DAY) {
    updateUI();
    return;
  }

  todayAnswers.push({
    question: currentQuestion,
    answer: selectedAnswer,
    timestamp: new Date().toISOString()
  });

  const today = new Date().toLocaleDateString();
  localStorage.setItem(`questions_${today}`, JSON.stringify(todayAnswers));

  document.getElementById("status").innerHTML = "✅ Saved 💌";
  document.getElementById("status").style.color = "#2c6e2c";

  /* ✅ SAVE TO VAULT AFTER 5 */
  if (todayAnswers.length === MAX_PER_DAY) {

    const currentUser =
      localStorage.getItem("loveUser") ||
      localStorage.getItem("loveUserName") ||
      "Anonymous";

    let vault = JSON.parse(localStorage.getItem("vault") || "[]");

    vault.push({
      source_page: "Love Questions",
      section: "Love Questions",
      content: JSON.stringify(todayAnswers),
      created_at: new Date().toISOString(),
      author: currentUser,
      type: "question"
    });

    localStorage.setItem("vault", JSON.stringify(vault));
  }

  /* ✅ LOAD NEXT QUESTION ONLY IF NOT DONE */
  if (todayAnswers.length < MAX_PER_DAY) {
    const remainingQuestions = questions.filter(q =>
      !todayAnswers.some(a => a.question === q)
    );

    currentQuestion =
      remainingQuestions.length > 0
        ? remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)]
        : questions[Math.floor(Math.random() * questions.length)];
  }

  updateUI();

  setTimeout(() => {
    document.getElementById("status").innerHTML = "";
  }, 2000);
}

/* ================= RESET ================= */
function resetToday() {
  if (confirm("Reset today's answers?")) {
    const today = new Date().toLocaleDateString();
    localStorage.removeItem(`questions_${today}`);
    todayAnswers = [];
    currentQuestion = questions[Math.floor(Math.random() * questions.length)];

    // ✅ SHOW BUTTONS AGAIN
    document.querySelector(".yes").style.display = "inline-block";
    document.querySelector(".no").style.display = "inline-block";

    updateUI();
  }
}

window.resetToday = resetToday;

/* ================= INIT ================= */
loadTodayAnswers();
