<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💖 Love Vault | All Memories</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #fffaf7;
      color: #a51c30;
      margin: 0;
      padding: 20px;
      position: relative;
      min-height: 100vh;
    }
    body::before {
      content: "❤️";
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 32rem;
      color: rgba(179, 0, 0, 0.04);
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin: 0 0 0.25rem 0;
      color: #b82b2b;
    }
    .profile-badge {
      text-align: center;
      background: linear-gradient(135deg, #ffe6e6, #fff0f0);
      padding: 10px 20px;
      border-radius: 60px;
      display: inline-block;
      margin: 0 auto 20px;
      font-size: 0.95rem;
      border: 1px solid #ffcccc;
      color: #a33535;
    }
    .stats {
      text-align: center;
      margin: 10px 0;
      color: #b65c5c;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 15px 0 20px;
    }
    #search {
      flex: 2;
      min-width: 200px;
      padding: 12px 18px;
      border: 1.5px solid #e6b0b0;
      border-radius: 60px;
      font-size: 1rem;
      background: white;
      outline: none;
    }
    .action-btn {
      background: white;
      border: 1.5px solid #c95a5a;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #a51c30;
    }
    .action-btn:hover {
      background: #ffe0e0;
    }
    .share-btn {
      background: #128C7E;
      border-color: #0e6b5f;
      color: white;
    }
    .sync-btn {
      background: #1e4a76;
      border-color: #0f3554;
      color: white;
    }
    .delete-all-btn {
      background: #8b2c2c;
      border-color: #5e1a1a;
      color: white;
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
    }
    .filter-btn {
      background: #ffe0e0;
      border: 1px solid #e6b0b0;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .filter-btn.active {
      background: #b30000;
      color: white;
      border-color: #b30000;
    }
    h2 {
      border-left: 6px solid #e68a8a;
      padding-left: 18px;
      margin: 25px 0 15px 0;
      color: #ab3e3e;
    }
    #vault {
      background: #fff5f0;
      border-radius: 32px;
      border: 1px solid #ffcdcd;
      padding: 20px 16px;
      max-height: 500px;
      overflow-y: auto;
    }
    .vault-entry {
      background: white;
      margin-bottom: 22px;
      padding: 18px 20px;
      border-radius: 28px;
      border: 1px solid #ffdddd;
      position: relative;
    }
    .vault-entry:hover {
      border-color: #e6a0a0;
    }
    .type-badge {
      position: absolute;
      top: -12px;
      right: 20px;
      background: #b30000;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .type-badge.plan { background: #2c6e2c; }
    .type-badge.promise { background: #8b4513; }
    .type-badge.question { background: #9b59b6; }
    .type-badge.message { background: #1e4a76; }
    .type-badge.song { background: #1d4ed8; }
    .source-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: #ffefef;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      color: #b32d2d;
      margin-bottom: 12px;
    }
    .date-label {
      font-size: 0.8rem;
      color: #8a5a5a;
      margin: 8px 0;
    }
    .message-box {
      background: #fef9f4;
      padding: 16px 18px;
      border-radius: 24px;
      margin: 10px 0;
      border-left: 5px solid #e67e7e;
      word-break: break-word;
      line-height: 1.5;
    }
    .qa-pair {
      background: #fff0f0;
      margin: 10px 0;
      padding: 10px;
      border-radius: 16px;
    }
    .question-text {
      font-weight: bold;
      color: #b30000;
    }
    .answer-text {
      color: #2c6e2c;
      margin-left: 15px;
    }
    .song-link {
      display: inline-block;
      margin-top: 10px;
      color: #1d4ed8;
      text-decoration: none;
    }
    .author {
      font-size: 0.85rem;
      color: #7b4a4a;
      margin-top: 8px;
      font-weight: 500;
    }
    .empty-memories {
      text-align: center;
      padding: 48px 20px;
      color: #bd8a8a;
    }
    #notify {
      text-align: center;
      margin: 16px auto 0;
      padding: 6px 12px;
      border-radius: 50px;
      display: inline-block;
      background: #ffe1e1;
      color: #b14545;
    }
    .footer-meta {
      margin-top: 20px;
      font-size: 0.75rem;
      text-align: center;
      color: #c49191;
    }
    .refresh-note {
      text-align: center;
      font-size: 0.7rem;
      color: #c49191;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>📖 Love Vault</h1>

<div id="profileInfo" class="profile-badge">
  💝 <span id="displayUsername">Loading profile...</span>
</div>

<div class="stats" id="statsDisplay"></div>

<div class="toolbar">
  <input id="search" type="text" placeholder="🔍 Search all memories...">
  <button onclick="shareVaultUI()" class="action-btn share-btn">📲 Share Vault</button>
  <button onclick="syncLocalToSupabaseWrapper()" class="action-btn sync-btn">🔄 Sync to Cloud</button>
</div>

<div class="filter-buttons">
  <button class="filter-btn active" data-filter="all">📋 All</button>
  <button class="filter-btn" data-filter="plan">📝 Plans</button>
  <button class="filter-btn" data-filter="promise">🤝 Promises</button>
  <button class="filter-btn" data-filter="question">❓ Questions</button>
  <button class="filter-btn" data-filter="message">💬 Messages</button>
  <button class="filter-btn" data-filter="song">🎵 Songs</button>
</div>

<h2>💌 All Treasured Memories</h2>
<div id="vault">
  <div style="text-align:center; padding: 2rem;">✨ Loading memories from all your pages... ✨</div>
</div>
<div class="refresh-note">🔄 Auto-refreshes every 3 seconds | Data from messages.html, plans.html, promise.html, song.html & questions.html</div>

<div id="notify" style="display: none;"></div>
<div class="footer-meta">❤️ Every memory you save appears here automatically</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
  const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
  const supabase = createClient(supabaseUrl, supabaseKey);

  let allMemories = [];
  let currentFilter = "all";
  let currentSearchTerm = "";
  let currentUserProfile = { id: null, username: "MyLove" };

  // =============== LOAD PROFILE ===============
  function loadProfile() {
    const username = localStorage.getItem("loveUser");
    const email = localStorage.getItem("loveEmail");
    const userId = localStorage.getItem("loveUserId");
    
    if (username && username !== "null") {
      currentUserProfile = {
        id: userId || username,
        username: username,
        email: email || ""
      };
      document.getElementById("displayUsername").innerHTML = `Writing as: <strong>${username}</strong>`;
    } else {
      // Set a default profile
      localStorage.setItem("loveUser", "MyLove");
      localStorage.setItem("loveUserId", "default_user_123");
      currentUserProfile = {
        id: "default_user_123",
        username: "MyLove",
        email: ""
      };
      document.getElementById("displayUsername").innerHTML = `Writing as: <strong>MyLove</strong>`;
    }
  }

  // =============== FORMAT CONTENT FOR DISPLAY ===============
  function formatQuestionAnswers(content) {
    try {
      const parsed = JSON.parse(content);
      if (Array.isArray(parsed)) {
        return `
          <div style="margin: 10px 0;">
            ${parsed.map(qa => `
              <div class="qa-pair">
                <div class="question-text">❓ ${escapeHtml(qa.question)}</div>
                <div class="answer-text">💖 Answer: ${escapeHtml(qa.answer)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
    } catch(e) {}
    return `<div>${escapeHtml(content)}</div>`;
  }

  // =============== COLLECT FROM ALL PAGES ===============
  function collectFromAllPages() {
    const allEntries = [];

    // 1. PLANS page - "couplePlans"
    let plans = JSON.parse(localStorage.getItem("couplePlans") || "[]");
    console.log(`📝 Found ${plans.length} plans`);
    plans.forEach((plan, index) => {
      allEntries.push({
        id: `plan_${Date.now()}_${index}_${Math.random()}`,
        source: "Plans",
        content: plan.title ? `${plan.title}: ${plan.text}` : (plan.text || plan.content || ""),
        type: "plan",
        created_at: plan.created_at || plan.date || new Date().toISOString(),
        author: plan.author || currentUserProfile.username,
        rawContent: plan.text || plan.content || ""
      });
    });

    // 2. Get all entries from main "vault" localStorage
    let vault = JSON.parse(localStorage.getItem("vault") || "[]");
    console.log(`📦 Found ${vault.length} vault entries`);
    
    vault.forEach((item, index) => {
      const sourcePage = item.source_page || "";
      let type = "";
      let displaySource = "";
      
      if (sourcePage === "Promises" || sourcePage === "promise") {
        type = "promise";
        displaySource = "Promises";
      } 
      else if (sourcePage === "Love Questions" || sourcePage === "questions" || sourcePage === "Questions") {
        type = "question";
        displaySource = "Love Questions";
      }
      else if (sourcePage === "Messages" || sourcePage === "messages") {
        type = "message";
        displaySource = "Messages";
      }
      else if (sourcePage === "Songs" || sourcePage === "songs") {
        type = "song";
        displaySource = "Songs";
      }
      else if (sourcePage === "Plans" || sourcePage === "plans") {
        type = "plan";
        displaySource = "Plans";
      }
      
      if (type) {
        allEntries.push({
          id: `${type}_${Date.now()}_${index}_${Math.random()}`,
          source: displaySource,
          content: item.content || "",
          type: type,
          created_at: item.created_at || new Date().toISOString(),
          author: item.author || currentUserProfile.username,
          rawContent: item.content || "",
          link: item.link
        });
      }
    });

    console.log(`📊 Total collected: ${allEntries.length} entries`);
    return allEntries;
  }

  // =============== LOAD FROM CLOUD ===============
  async function loadFromCloud() {
  try {
    const username =
      localStorage.getItem("loveUser") || "MyLove";

    let { data, error } = await supabase
      .from("love_vault")
      .select("*")
      .eq("username", username)
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return [];
    }

    return (data || []).map(item => ({
      id: item.id,
      source: item.source_page || "Memory",
      content: item.content || "",
      type: item.type || item.section || "memory",
      created_at: item.created_at,
      author: item.username,
      isCloud: true
    }));

  } catch (err) {
    console.error(err);
    return [];
  }
}
     
   // =============== MERGE AND DISPLAY ===============
  async function loadAndDisplay() {
    const localMemories = collectFromAllPages();
    const cloudMemories = await loadFromCloud();
    
    let merged = [...cloudMemories];
    
    for (const local of localMemories) {
      const isDuplicate = merged.some(cloud => 
        cloud.content === local.content && 
        Math.abs(new Date(cloud.created_at) - new Date(local.created_at)) < 60000
      );
      if (!isDuplicate) {
        merged.push({ ...local, isLocal: true });
      }
    }
    
    merged.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    allMemories = merged;
    updateStats();
    applyFiltersAndSearch();
  }

  function updateStats() {
    const stats = {
      plan: allMemories.filter(m => m.type === "plan").length,
      promise: allMemories.filter(m => m.type === "promise").length,
      question: allMemories.filter(m => m.type === "question").length,
      message: allMemories.filter(m => m.type === "message").length,
      song: allMemories.filter(m => m.type === "song").length,
      total: allMemories.length
    };
    document.getElementById("statsDisplay").innerHTML = `📊 ${stats.total} total | 📝 ${stats.plan} plans | 🤝 ${stats.promise} promises | ❓ ${stats.question} questions | 💬 ${stats.message} messages | 🎵 ${stats.song} songs`;
  }

  function applyFiltersAndSearch() {
    let filtered = [...allMemories];
    
    if (currentFilter !== "all") {
      filtered = filtered.filter(m => m.type === currentFilter);
    }
    
    if (currentSearchTerm.trim()) {
      const term = currentSearchTerm.toLowerCase();
      filtered = filtered.filter(m => 
        (m.rawContent || m.content || "").toLowerCase().includes(term) ||
        (m.source || "").toLowerCase().includes(term) ||
        (m.author || "").toLowerCase().includes(term)
      );
    }
    
    renderVault(filtered);
  }

  function getTypeEmoji(type) {
    switch(type) {
      case "plan": return "📝";
      case "promise": return "🤝";
      case "question": return "❓";
      case "message": return "💬";
      case "song": return "🎵";
      default: return "💖";
    }
  }

  function getTypeColor(type) {
    switch(type) {
      case "plan": return "#2c6e2c";
      case "promise": return "#8b4513";
      case "question": return "#9b59b6";
      case "message": return "#1e4a76";
      case "song": return "#1d4ed8";
      default: return "#b30000";
    }
  }

  function getTypeName(type) {
    switch(type) {
      case "plan": return "Plan";
      case "promise": return "Promise";
      case "question": return "Love Question";
      case "message": return "Message";
      case "song": return "Song";
      default: return "Memory";
    }
  }

  function formatDate(dateString) {
    if (!dateString) return "✨ Recently";
    try {
      const d = new Date(dateString);
      if (!isNaN(d.getTime())) {
        return d.toLocaleString();
      }
    } catch(e) {}
    return "✨ Recently";
  }

  function renderVault(memories) {
    const vaultDiv = document.getElementById("vault");
    
    if (!memories || memories.length === 0) {
      vaultDiv.innerHTML = `<div class="empty-memories">
        🌸 No memories yet! 🌸<br><br>
        Go to your pages and save something:<br><br>
        📝 plans.html &nbsp;|&nbsp; 🤝 promise.html &nbsp;|&nbsp; ❓ questions.html<br>
        💬 messages.html &nbsp;|&nbsp; 🎵 song.html<br><br>
        Then come back here - memories will appear automatically!
      </div>`;
      return;
    }
    
    vaultDiv.innerHTML = memories.map((memory) => {
      const typeName = getTypeName(memory.type);
      const typeEmoji = getTypeEmoji(memory.type);
      const typeColor = getTypeColor(memory.type);
      const dateStr = formatDate(memory.created_at);
      
      let displayContent = "";
      if (memory.type === "question") {
        displayContent = formatQuestionAnswers(memory.content);
      } else if (memory.type === "song") {
        displayContent = `<div>${escapeHtml(memory.rawContent || memory.content || "")}</div>`;
        if (memory.link && memory.link.trim()) {
          displayContent += `<div><a href="${escapeHtml(memory.link)}" target="_blank" class="song-link">🎵 Listen online 🔗</a></div>`;
        }
      } else {
        displayContent = `<div>${escapeHtml(memory.rawContent || memory.content || "")}</div>`;
      }
      
      return `
        <div class="vault-entry">
          <div class="type-badge" style="background: ${typeColor}">${typeEmoji} ${typeName}</div>
          <div class="source-label">📂 ${escapeHtml(memory.source || "Untitled")}</div>
          <div class="date-label">📅 ${escapeHtml(dateStr)}</div>
          <div class="message-box"><strong>💌 Memory:</strong><br><br>${displayContent}</div>
          <div class="author">✍️ By: ${escapeHtml(memory.author || "Anonymous")}</div>
        </div>
      `;
    }).join("");
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // =============== SYNC TO CLOUD ===============
  async function ensureUserInDatabase() {
    try {
      let { data: existingUser } = await supabase
        .from("love_users")
        .select("id")
        .eq("username", currentUserProfile.username)
        .maybeSingle();
      
      if (existingUser) {
        currentUserProfile.id = existingUser.id;
        return existingUser.id;
      } else {
        const { data: newUser } = await supabase
          .from("love_users")
          .insert({ username: currentUserProfile.username, email: currentUserProfile.email || "" })
          .select()
          .single();
        if (newUser) {
          currentUserProfile.id = newUser.id;
          return newUser.id;
        }
      }
    } catch (err) {
      console.error(err);
    }
    return null;
  }
window.syncLocalToSupabaseWrapper = async function () {

  const notifyDiv = document.getElementById("notify");

  notifyDiv.style.display = "block";
  notifyDiv.innerText = "🔄 Syncing to cloud...";

  try {

    const username =
      localStorage.getItem("loveUser") || "MyLove";

    const localMemories = collectFromAllPages();

    let synced = 0;

    for (const mem of localMemories) {

      const { error } = await supabase
        .from("love_vault")
        .upsert(
          {
            username,
            source_page: mem.source,
            section: mem.type,
            content: mem.rawContent || mem.content,
            type: mem.type,
            created_at: mem.created_at
          },
          {
            onConflict: "username,content,created_at"
          }
        );

      if (!error) synced++;
    }

    notifyDiv.innerText =
      `✅ Synced ${synced} memories`;

    await loadAndDisplay();

  } catch (err) {

    notifyDiv.innerText =
      `❌ ${err.message}`;

  }

  setTimeout(() => {
    notifyDiv.style.display = "none";
  }, 3000);
};
   // =============== SHARE VAULT ===============
  window.shareVaultUI = function() {
    if (!allMemories.length) {
      alert("No memories to share yet! Go save something first.");
      return;
    }
    let text = `📖 LOVE VAULT - ${currentUserProfile.username}\n${new Date().toLocaleString()}\n\n`;
    allMemories.forEach((m, i) => {
      text += `[${i+1}] ${m.type?.toUpperCase()}: ${m.source}\n`;
      text += `Content: ${(m.rawContent || m.content || "").substring(0, 200)}\n`;
      text += `📅 ${formatDate(m.created_at)}\n✍️ ${m.author}\n\n`;
    });
    navigator.clipboard.writeText(text);
    alert("📋 Vault copied to clipboard!");
  };

  // =============== EVENT LISTENERS ===============
  document.getElementById("search").addEventListener("input", (e) => {
    currentSearchTerm = e.target.value;
    applyFiltersAndSearch();
  });
  
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.getAttribute("data-filter");
      applyFiltersAndSearch();
    });
  });
  
  // Realtime subscription for cloud changes
  supabase.channel("vault-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "love_vault" }, () => loadAndDisplay())
    .subscribe();
  
  // Auto-refresh every 3 seconds to catch localStorage changes from other pages
  setInterval(() => {
    loadAndDisplay();
  }, 3000);
  
  // INIT
  loadProfile();
  loadAndDisplay();
</script>
</body>
</html>
