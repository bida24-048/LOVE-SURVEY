<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📖 Love Vault</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background: white; color: #b30000; min-height: 100vh; position: relative; margin:0; padding:20px; }
body::before { content:"❤"; position: fixed; top:50%; left:50%; font-size:40rem; color: rgba(179,0,0,0.08); transform: translate(-50%,-50%); z-index:-1; }
h1 { color:#b30000; margin-top:20px; }
h2 { color:#b30000; margin-top:25px; }
#vault { margin-top:20px; max-height:600px; overflow-y:auto; border:1px solid #b30000; padding:10px; border-radius:8px; background: #ffe6e6; text-align:left; }
.vault-entry { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #b30000; border-radius: 5px; background: #fff0f0; }
.author { font-size: 0.9rem; color: #555; }
.action-btn { font-size: 14px; margin:5px; padding:6px 10px; border-radius:5px; border:none; cursor:pointer; }
.share-btn { background: #128C7E; color:white; }
.delete-btn { background: #d63333; color:white; }
#notify { margin-top:15px; font-weight:bold; color:#b30000; }
#search { margin-top:15px; padding:8px; width:60%; border:1px solid #b30000; border-radius:5px; }
</style>
</head>
<body>

<h1>📖 Love Vault</h1>

<div>
  <input id="search" type="text" placeholder="🔍 Search the Vault...">
  <button onclick="shareVault()" class="action-btn share-btn">Share Whole Vault on WhatsApp 📲</button>
</div>

<h2>Vault 💖</h2>
<div id="vault">Loading vault...</div>
<p id="notify"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://ietfunnecbuxrnsmxcyc.supabase.co";
const supabaseKey = "sb_publishable_oAiBSi-KMQDfAoKT7zGLgw_tdutSjlF"; // anon key
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let vaultData = [];

async function loadVault() {
  const { data, error } = await supabaseClient
    .from("love_vault")
    .select("*")
    .order("created_at");

  if (error) {
    console.error("Error loading vault:", error);
    document.getElementById("vault").innerText = "⚠️ Could not load vault";
    return;
  }

  vaultData = data;
  renderVault(data);
}

function renderVault(data) {
  const vaultDiv = document.getElementById("vault");
  if (!data || data.length === 0) {
    vaultDiv.innerText = "Vault is empty 😘";
    return;
  }

  // Group entries by section
  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.section]) grouped[item.section] = [];
    grouped[item.section].push(item);
  });

  vaultDiv.innerHTML = Object.keys(grouped).map(section => {
    const entries = grouped[section].map(entry => `
      <div class="vault-entry">
        <p>${entry.content}</p>
        <p class="author">— ${entry.author || "Anonymous"} (${new Date(entry.created_at).toLocaleString()})</p>
        <button class="action-btn share-btn" onclick="shareSingle(${entry.id})">Share 📲</button>
      </div>
    `).join("");
    return `
      <div class="section">
        <h3>${section.toUpperCase()}</h3>
        ${entries}
      </div>
    `;
  }).join("");
}

// 🔍 Search filter
document.getElementById("search").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  const filtered = vaultData.filter(entry =>
    entry.content.toLowerCase().includes(term) ||
    (entry.author && entry.author.toLowerCase().includes(term)) ||
    entry.section.toLowerCase().includes(term)
  );
  renderVault(filtered);
});

// 📲 Share whole vault
function shareVault(){
  if(vaultData.length===0) return alert("Vault is empty 😘");
  let text="📖💖 Love Vault 💖📖\n\n";
  vaultData.forEach(entry=>{
    text+=`[${entry.section}] ${entry.content}\n— ${entry.author||"Anonymous"}\n${new Date(entry.created_at).toLocaleString()}\n\n`;
  });
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
}

// 📲 Share single entry
function shareSingle(id){
  const entry = vaultData.find(e=>e.id===id);
  if(!entry) return;
  let text=`[${entry.section}] ${entry.content}\n— ${entry.author||"Anonymous"}\n${new Date(entry.created_at).toLocaleString()}`;
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
}

// 🔔 Realtime notifications
supabaseClient
  .channel("love-vault")
  .on("postgres_changes", { event: "INSERT", schema: "public", table: "love_vault" }, payload => {
    document.getElementById("notify").innerText = "✨ New update added! Check the Vault 💕";
    loadVault(); // refresh vault
  })
  .subscribe();

// Load vault on page open
loadVault();
</script>

<p style="text-align:center; color:#b30000; margin-top:30px; font-weight:bold;">
❤️ I LOVE YOU SO MUCH 💖
</p>
</body>
</html>
