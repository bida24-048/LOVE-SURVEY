<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💖 G&L Love Vault — Shared Cloud</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #fffaf7;
      color: #a51c30;
      margin: 0;
      padding: 20px;
      position: relative;
      min-height: 100vh;
    }
    body::before {
      content: "❤️";
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 32rem;
      color: rgba(179, 0, 0, 0.04);
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin: 0 0 0.25rem 0;
      color: #b82b2b;
    }
    .profile-badge {
      text-align: center;
      background: linear-gradient(135deg, #ffe6e6, #fff0f0);
      padding: 10px 20px;
      border-radius: 60px;
      display: inline-block;
      margin: 0 auto 20px;
      font-size: 0.95rem;
      border: 1px solid #ffcccc;
      color: #a33535;
    }
    .stats {
      text-align: center;
      margin: 10px 0;
      color: #b65c5c;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 15px 0 20px;
    }
    #search {
      flex: 2;
      min-width: 200px;
      padding: 12px 18px;
      border: 1.5px solid #e6b0b0;
      border-radius: 60px;
      font-size: 1rem;
      background: white;
      outline: none;
    }
    .action-btn {
      background: white;
      border: 1.5px solid #c95a5a;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #a51c30;
    }
    .action-btn:hover {
      background: #ffe0e0;
    }
    .share-btn {
      background: #128C7E;
      border-color: #0e6b5f;
      color: white;
    }
    .sync-btn {
      background: #1e4a76;
      border-color: #0f3554;
      color: white;
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
    }
    .filter-btn {
      background: #ffe0e0;
      border: 1px solid #e6b0b0;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .filter-btn.active {
      background: #b30000;
      color: white;
      border-color: #b30000;
    }
    .filter-btn:hover {
      transform: scale(1.05);
    }
    h2 {
      border-left: 6px solid #e68a8a;
      padding-left: 18px;
      margin: 25px 0 15px 0;
      color: #ab3e3e;
    }
    #vault {
      background: #fff5f0;
      border-radius: 32px;
      border: 1px solid #ffcdcd;
      padding: 20px 16px;
      max-height: 500px;
      overflow-y: auto;
    }
    .vault-entry {
      background: white;
      margin-bottom: 22px;
      padding: 18px 20px;
      border-radius: 28px;
      border: 1px solid #ffdddd;
      position: relative;
      transition: all 0.2s ease;
    }
    .vault-entry:hover {
      border-color: #e6a0a0;
      box-shadow: 0 2px 8px rgba(179, 0, 0, 0.08);
    }
    .vault-entry.current-user {
      border-left: 5px solid #b30000;
      background: #fff8f8;
    }
    .type-badge {
      position: absolute;
      top: -12px;
      right: 20px;
      background: #b30000;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .type-badge.plan { background: #2c6e2c; }
    .type-badge.promise { background: #8b4513; }
    .type-badge.question { background: #9b59b6; }
    .type-badge.message { background: #1e4a76; }
    .type-badge.song { background: #1d4ed8; }
    .source-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: #ffefef;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      color: #b32d2d;
      margin-bottom: 12px;
    }
    .date-label {
      font-size: 0.8rem;
      color: #8a5a5a;
      margin: 8px 0;
    }
    .message-box {
      background: #fef9f4;
      padding: 16px 18px;
      border-radius: 24px;
      margin: 10px 0;
      border-left: 5px solid #e67e7e;
      word-break: break-word;
      line-height: 1.5;
    }
    .qa-pair {
      background: #fff0f0;
      margin: 10px 0;
      padding: 10px;
      border-radius: 16px;
    }
    .question-text {
      font-weight: bold;
      color: #b30000;
    }
    .answer-text {
      color: #2c6e2c;
      margin-left: 15px;
    }
    .song-link {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
      color: white !important;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .song-link:hover {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      transform: scale(1.02);
    }
    .author {
      font-size: 0.85rem;
      color: #7b4a4a;
      margin-top: 8px;
      font-weight: 500;
      padding: 6px 12px;
      background: #f5f0f0;
      border-radius: 20px;
      display: inline-block;
    }
    .author.current-user {
      color: #b30000;
      font-weight: bold;
      background: #ffe0e0;
    }
    .author-label {
      font-size: 0.75rem;
      background: #b30000;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }
    .empty-memories {
      text-align: center;
      padding: 48px 20px;
      color: #bd8a8a;
    }
    #notify {
      text-align: center;
      margin: 16px auto 0;
      padding: 6px 12px;
      border-radius: 50px;
      display: inline-block;
      background: #ffe1e1;
      color: #b14545;
    }
    .footer-meta {
      margin-top: 20px;
      font-size: 0.75rem;
      text-align: center;
      color: #c49191;
    }
    .refresh-note {
      text-align: center;
      font-size: 0.7rem;
      color: #c49191;
      margin-top: 8px;
    }
    .cloud-badge {
      background: #e9f5ff;
      color: #0c4e6e;
      display: inline-block;
      border-radius: 30px;
      padding: 2px 12px;
      font-size: 0.7rem;
      margin-left: 8px;
      font-weight: normal;
    }
    .song-link-container {
      margin-top: 12px;
    }
    .login-section {
      background: white;
      padding: 20px;
      border-radius: 20px;
      border: 2px solid #ffcdcd;
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
    }
    .login-section input {
      padding: 10px 15px;
      border: 1.5px solid #e6b0b0;
      border-radius: 30px;
      font-size: 1rem;
      margin: 5px;
      width: 80%;
    }
    .login-section button {
      background: #b30000;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s ease;
    }
    .login-section button:hover {
      background: #8a0000;
      transform: scale(1.05);
    }
    .logout-btn {
      background: #666;
      border-color: #444;
      color: white;
      margin-left: 10px;
    }
    .logout-btn:hover {
      background: #444;
    }
    .debug-info {
      font-size: 0.7rem;
      color: #999;
      text-align: center;
      margin-top: 10px;
      padding: 5px;
      background: #f5f5f5;
      border-radius: 10px;
    }
    .sync-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-left: 8px;
    }
    .sync-indicator.synced {
      background: #2ecc71;
    }
    .sync-indicator.syncing {
      background: #f39c12;
      animation: pulse 1s infinite;
    }
    .sync-indicator.error {
      background: #e74c3c;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<h1>📖 G&L Love Vault</h1>

<div id="profileInfo" class="profile-badge">
  💝 <span id="displayUsername">Loading profile...</span>
  <span class="cloud-badge" id="cloudSyncStatus">☁️ shared vault</span>
  <span class="sync-indicator" id="syncIndicator"></span>
</div>

<div class="stats" id="statsDisplay"></div>

<div class="toolbar">
  <input id="search" type="text" placeholder="🔍 Search all memories...">
  <button onclick="shareVaultUI()" class="action-btn share-btn">📲 Share Vault</button>
  <button onclick="manualSyncNow()" class="action-btn sync-btn">🔄 Force Sync</button>
</div>

<div class="filter-buttons">
  <button class="filter-btn active" data-filter="all">📋 All</button>
  <button class="filter-btn" data-filter="plan">📝 Plans</button>
  <button class="filter-btn" data-filter="promise">🤝 Promises</button>
  <button class="filter-btn" data-filter="question">❓ Questions</button>
  <button class="filter-btn" data-filter="message">💬 Messages</button>
  <button class="filter-btn" data-filter="song">🎵 Songs</button>
  <button class="filter-btn" data-filter="mine">👤 My Entries</button>
</div>

<h2>💌 Love Memories</h2>
<div id="vault">
  <div style="text-align:center; padding: 2rem;">✨ Loading shared memories from everyone... ✨</div>
</div>
<div class="refresh-note">🔄 Auto‑refresh every 3 sec</div>

<div id="notify" style="display: none;"></div>
<div class="footer-meta">❤️ Everything is backed up to the shared cloud </div>
<div class="debug-info" id="debugInfo">📡 Initializing...</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

let allMemories = [];
let currentUser = "Anonymous";

/* ================= PROFILE ================= */
function loadProfile() {
  const storedUser =
    localStorage.getItem("loveUser") ||
    localStorage.getItem("username") ||
    localStorage.getItem("profileName");

  if (!storedUser) {
    document.getElementById("displayUsername").innerText = "👤 Anonymous";
    return false;
  }

  currentUser = storedUser;

  document.getElementById("displayUsername").innerHTML =
    `👤 <strong>${currentUser}</strong>`;

  return true;
}

/* ================= LOAD FROM CLOUD ================= */
async function loadFromCloud() {
  const { data, error } = await supabase
    .from("love_vault")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("❌ LOAD ERROR:", error);
    document.getElementById("vault").innerHTML =
      "❌ Failed to load memories.";
    return;
  }

  allMemories = data || [];
  renderVault(allMemories);
}

/* ================= REALTIME ================= */
function initRealtime() {
  supabase.channel("live-vault")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "love_vault"
    }, () => {
      loadFromCloud();
    })
    .subscribe();
}

/* ================= SYNC TRACK ================= */
function getSyncedKeys() {
  return JSON.parse(localStorage.getItem("syncedMemories") || "[]");
}
function saveSyncedKeys(keys) {
  localStorage.setItem("syncedMemories", JSON.stringify(keys));
}

/* ================= COLLECT LOCAL ================= */
function collectLocalMemories() {
  let entries = [];

  const plans = JSON.parse(localStorage.getItem("couplePlans") || "[]");
  plans.forEach(p => {
    if (p.text) {
      entries.push({
        content: p.text,
        type: "plan",
        source: "Plans"
      });
    }
  });

  const vault = JSON.parse(localStorage.getItem("vault") || "[]");
  vault.forEach(v => {
    if (v.content) {
      entries.push({
        content: v.content,
        type: v.type || "memory",
        source: v.source_page || "Memory"
      });
    }
  });

  return entries;
}

/* ================= SYNC NEW ONLY ================= */
async function syncNewLocalData() {
  const localData = collectLocalMemories();
  let syncedKeys = getSyncedKeys();

  for (const mem of localData) {
    const key = mem.content.trim().toLowerCase() + "_" + mem.type;

    if (syncedKeys.includes(key)) continue;

    const { error } = await supabase.from("love_vault").insert({
      username: currentUser,
      content: mem.content.trim(),
      type: mem.type,
      source_page: mem.source,
      created_at: new Date().toISOString()
    });

    if (!error) {
      syncedKeys.push(key);
      saveSyncedKeys(syncedKeys);
    } else {
      console.error("❌ INSERT ERROR:", error);
    }
  }
}

/* ================= STORAGE LISTENER ================= */
window.addEventListener("storage", (e) => {
  if (e.key === "couplePlans" || e.key === "vault") {
    syncNewLocalData();
  }
});

/* ================= MANUAL SYNC ================= */
window.manualSyncNow = function () {
  syncNewLocalData();
};

/* ================= RENDER ================= */
function renderVault(memories) {
  const vault = document.getElementById("vault");

  if (!memories || memories.length === 0) {
    vault.innerHTML = "💔 No memories yet.";
    return;
  }

  vault.innerHTML = memories.map(m => {

    const content = m.content || "";

    /* ✅ DETECT LINK */
    const urlMatch = content.match(/https?:\/\/[^\s]+/);
    const url = urlMatch ? urlMatch[0] : null;

    const cleanText = url
      ? content.replace(url, "").trim()
      : content;

    let displayContent = cleanText;

    /* ✅ CLEAN QUESTION FORMAT */
    if (m.type === "question") {
      try {
        const parsed = JSON.parse(content);

        if (Array.isArray(parsed)) {
          displayContent = parsed.map((qa, index) => `
            <div style="margin-bottom:10px;">
              <div><strong>Question ${index + 1}:</strong></div>
              <div>❓ ${qa.question}</div>
              <div style="color:#2c6e2c;">💖 Answer: ${qa.answer}</div>
            </div>
          `).join("");
        }
      } catch (e) {
        displayContent = cleanText;
      }
    }

    return `
      <div class="vault-entry">
        <div><strong>${(m.type || "memory").toUpperCase()}</strong></div>

        <div>${displayContent}</div>

        ${
          url ? `
          <a href="${url}" target="_blank" class="song  </a>
        ` : ""
        }

        <div>✍️ ${m.username || "Anonymous"}</div>
        <div>${new Date(m.created_at).toLocaleString()}</div>
      </div>
    `;
  }).join("");
}

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  const filtered = allMemories.filter(m =>
    (m.content || "").toLowerCase().includes(t) ||
    (m.username || "").toLowerCase().includes(t)
  );
  renderVault(filtered);
});

/* ================= LOGOUT ================= */
window.logoutUser = function () {
  localStorage.removeItem("loveUser");
  localStorage.removeItem("syncedMemories");
  location.reload();
};

/* ================= INIT ================= */
loadProfile();
loadFromCloud();
initRealtime();

// ✅ IMPORTANT: initial sync
setTimeout(syncNewLocalData, 1000);

</script>
 



</body>
</html>
