<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💬 Message Wall</title>
<style>
body { 
  font-family: Arial; 
  text-align: center; 
  background: white; 
  color: #b30000; 
  min-height: 100vh; 
  position: relative;
}
body::before { 
  content: "❤"; 
  position: fixed; 
  top: 50%; 
  left: 50%; 
  font-size: 40rem; 
  color: rgba(179,0,0,0.08); 
  transform: translate(-50%,-50%); 
  z-index: -1;
}
h1 { 
  color:#b30000; 
  margin-top:30px; 
  animation:pulse 2s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}
textarea { 
  padding:10px; 
  width:70%; 
  height:100px; 
  border-radius:8px; 
  border:2px solid #b30000; 
}
button { 
  padding:10px 20px; 
  background:#b30000; 
  color:white; 
  border:none; 
  border-radius:8px; 
  cursor:pointer; 
  margin-top:10px; 
  transition:.3s; 
}
button:hover { 
  background:white; 
  color:#b30000; 
  border:2px solid #b30000; 
}
#status { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>
<h1>💬 Message Wall</h1>
<textarea id="msgText" placeholder="Leave a message... 💕"></textarea><br>
<button onclick="saveItem()">Post Message 💌</button>
<p id="status"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const currentUserId = localStorage.getItem("loveUserId");
const currentUser = localStorage.getItem("loveUser");

async function saveItem() {
  const text = document.getElementById("msgText").value.trim();
  if(!text) return alert("Please type a message!");

  // ✅ Save to Supabase Love Vault
  const { error } = await supabase.from("love_vault").insert([{
    user_id: currentUserId,
    source_page: "Messages",
    section: "Messages",
    content: text,
    created_at: new Date().toISOString()
  }]);

  if(error){
    console.error(error);
    document.getElementById("status").innerText = "❌ Failed to save to Love Vault";
    return;
  }

  // ✅ Also save to localStorage for offline access
  const vault = JSON.parse(localStorage.getItem("vault")) || [];
  vault.push({ 
    source_page: "Messages",
    section: "Messages",
    content: text,
    created_at: new Date().toISOString(),
    user_id: currentUserId,
    author: currentUser || "Anonymous",
    type: "message"
  });
  localStorage.setItem("vault", JSON.stringify(vault));

  document.getElementById("msgText").value = "";
  document.getElementById("status").innerText = "Message saved to Love Vault 💬";
}
</script>
</body>
</html>
