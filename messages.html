<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💬 Message Wall</title>
<style>
body { 
  font-family: Arial; 
  text-align: center; 
  background: white; 
  color: #b30000; 
  min-height: 100vh; 
  position: relative;
  padding: 20px;
}
body::before { 
  content: "❤"; 
  position: fixed; 
  top: 50%; 
  left: 50%; 
  font-size: 40rem; 
  color: rgba(179,0,0,0.08); 
  transform: translate(-50%,-50%); 
  z-index: -1;
}
h1 { color:#b30000; margin-top:30px; animation:pulse 2s infinite; }
@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}
textarea { 
  padding:10px; 
  width:70%; 
  max-width: 500px;
  height:120px; 
  border-radius:8px; 
  border:2px solid #b30000;
  font-family: inherit;
}
button { 
  padding:10px 20px; 
  background:#b30000; 
  color:white; 
  border:none; 
  border-radius:8px; 
  cursor:pointer; 
  margin-top:10px; 
  transition:.3s; 
}
button:hover { 
  background:white; 
  color:#b30000; 
  border:2px solid #b30000; 
}
#status { margin-top:10px; font-weight:bold; }
.back-btn { background: #666; margin-left: 10px; }
</style>
</head>
<body>
<h1>💬 Message Wall</h1>
<textarea id="msgText" placeholder="Leave a message... 💕"></textarea><br>
<button onclick="saveMessage()">Post Message 💌</button>
<button onclick="window.location.href='vault.html'" class="back-btn">📖 Go to Vault</button>
<p id="status"></p>

<script>
function saveMessage() {
  const text = document.getElementById("msgText").value.trim();
  if(!text) {
    alert("Please type a message!");
    return;
  }
  
  // Get current user info
  const currentUser = localStorage.getItem("loveUser") || "Anonymous";
  
  // Get existing vault or create new
  let vault = JSON.parse(localStorage.getItem("vault") || "[]");
  
  // Add new message
  vault.push({ 
    source_page: "Messages",
    section: "Messages",
    content: text,
    created_at: new Date().toISOString(),
    author: currentUser,
    type: "message"
  });
  
  // Save back to localStorage
  localStorage.setItem("vault", JSON.stringify(vault));
  
  // Clear form
  document.getElementById("msgText").value = "";
  document.getElementById("status").innerHTML = "✅ Message saved to Love Vault! 💬<br>Go to Vault to see it.";
  
  setTimeout(() => {
    document.getElementById("status").innerHTML = "";
  }, 3000);
}
</script>
</body>
</html>
