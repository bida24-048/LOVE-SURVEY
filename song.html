<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎵 Add Song</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: white;
    color: #b30000;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }
  body::before {
    content: "❤";
    position: fixed;
    top: 50%;
    left: 50%;
    font-size: 40rem;
    color: rgba(179,0,0,0.08);
    transform: translate(-50%,-50%);
    z-index: -1;
  }
  h1 { color: #1d4ed8; }
  input, textarea {
    width: 70%;
    max-width: 500px;
    padding: 12px;
    margin: 10px 0;
    border: 2px solid #1d4ed8;
    border-radius: 8px;
    font-family: inherit;
  }
  button {
    padding: 12px 24px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .save-btn { background: #1d4ed8; color: white; }
  .save-btn:hover { background: #0f3a9e; }
  .back-btn { background: #10b981; color: white; }
  .back-btn:hover { background: #0a8a5e; }
  #status { margin-top: 10px; font-weight: bold; color: #2c6e2c; }
</style>
</head>
<body>

<h1>🎶 Add a Song</h1>

<input type="text" id="songTitle" placeholder="Song Title"><br>
<textarea id="songDesc" placeholder="Why this song is special 💖" rows="4"></textarea><br>
<input type="url" id="songLink" placeholder="Paste song link (YouTube, Spotify, etc.)"><br>

<button class="save-btn" onclick="saveSong()">Save to Vault 💖</button>
<button class="back-btn" onclick="window.location.href='vault.html'">📖 Go to Vault</button>

<p id="status"></p>

<script>
function saveSong() {
  const title = document.getElementById("songTitle").value.trim();
  const desc = document.getElementById("songDesc").value.trim();
  const link = document.getElementById("songLink").value.trim();

  if (!title) {
    alert("Please enter a song title 🎵");
    return;
  }

  // Get current user info
  const currentUser = localStorage.getItem("loveUser") || "Anonymous";
  
  // Format the content nicely
  let content = `🎵 ${title}`;
  if (desc) content += `\n\n💖 ${desc}`;
  if (link) content += `\n\n🔗 ${link}`;
  
  // Get existing vault or create new
  let vault = JSON.parse(localStorage.getItem("vault") || "[]");
  
  // Add new song
  vault.push({
    source_page: "Songs",
    section: "Songs",
    content: content,
    created_at: new Date().toISOString(),
    author: currentUser,
    type: "song",
    title: title,
    desc: desc,
    link: link
  });
  
  // Save back to localStorage
  localStorage.setItem("vault", JSON.stringify(vault));

  // Clear form
  document.getElementById("songTitle").value = "";
  document.getElementById("songDesc").value = "";
  document.getElementById("songLink").value = "";
  
  document.getElementById("status").innerHTML = "✅ Song saved to Love Vault! 🎵<br>Go to Vault to see it.";
  
  setTimeout(() => {
    document.getElementById("status").innerHTML = "";
  }, 3000);
}
</script>
</body>
</html>
