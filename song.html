<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎵 Add Song</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
    margin: 0;
    padding: 20px;
  }
  h1 { color: #1d4ed8; }
  input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #1d4ed8;
    border-radius: 8px;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .save-btn { background: #1d4ed8; color: white; }
  .back-btn { background: #10b981; color: white; }
</style>
</head>
<body>

<h1>🎶 Add a Song</h1>

<input type="text" id="songTitle" placeholder="Song Title"><br>
<textarea id="songDesc" placeholder="Why this song is special 💖"></textarea><br>
<input type="url" id="songLink" placeholder="Paste song link (YouTube, Spotify, etc.)"><br>
<input type="file" id="songFile" accept="audio/*"><br>

<button class="save-btn" onclick="saveSong()">Save to Vault 💖</button>
<button class="back-btn" onclick="window.location.href='vault.html'">Go to Vault 📖</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const currentUserId = localStorage.getItem("loveUserId");
const currentUser = localStorage.getItem("loveUser");

async function saveSong() {
  const title = document.getElementById("songTitle").value.trim();
  const desc = document.getElementById("songDesc").value.trim();
  const link = document.getElementById("songLink").value.trim();
  const fileInput = document.getElementById("songFile");

  let fileUrl = "";
  if (fileInput.files.length > 0) {
    fileUrl = URL.createObjectURL(fileInput.files[0]);
  }

  if (!title) {
    return alert("Please enter a song title 🎵");
  }

  // ✅ Save to Supabase Love Vault
  const { error } = await supabase.from("love_vault").insert([{
    user_id: currentUserId,
    source_page: "Songs",
    section: "Songs",
    content: `🎵 ${title}\n\n💖 ${desc}\n\n🔗 ${link}`,
    created_at: new Date().toISOString()
  }]);

  if(error){
    console.error(error);
    alert("❌ Failed to save to Love Vault");
    return;
  }

  // ✅ Also save locally for offline access
  const vault = JSON.parse(localStorage.getItem("vault")) || [];
  vault.push({
    source_page: "Songs",
    section: "Songs",
    content: `🎵 ${title}\n\n💖 ${desc}\n\n🔗 ${link}`,
    created_at: new Date().toISOString(),
    user_id: currentUserId,
    author: currentUser || "Anonymous",
    type: "song",
    title: title,
    desc: desc,
    link: link,
    file: fileUrl
  });
  localStorage.setItem("vault", JSON.stringify(vault));

  alert("Song saved to Love Vault 💖");

  // Clear form
  document.getElementById("songTitle").value = "";
  document.getElementById("songDesc").value = "";
  document.getElementById("songLink").value = "";
  document.getElementById("songFile").value = "";
}
</script>
</body>
</html>
