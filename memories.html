<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories Gallery 💕 | Sweet Moments</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
      background: linear-gradient(145deg, #fff5f9 0%, #ffe4ed 100%);
      text-align: center;
      margin: 0;
      padding: 30px 20px 60px;
      min-height: 100vh;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    h1 {
      color: #d63384;
      font-size: 2.5rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .subhead {
      font-size: 1.2rem;
      color: #a13e6b;
      background: #fff0f5dd;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 40px;
      margin-bottom: 30px;
    }

    .upload-card {
      background: white;
      max-width: 700px;
      margin: 10px auto 30px auto;
      padding: 20px 25px;
      border-radius: 48px;
      box-shadow: 0 12px 28px rgba(214, 51, 132, 0.2);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 14px;
      background: rgba(255, 248, 251, 0.95);
      border: 1px solid #ffc0d0;
    }

    .upload-card input[type="file"] {
      background: #ffeef4;
      border: 1px solid #d63384;
      border-radius: 60px;
      padding: 10px 18px;
      font-size: 0.9rem;
      color: #a12962;
      cursor: pointer;
      flex: 2;
      min-width: 180px;
    }

    .upload-card input[type="text"] {
      flex: 2;
      padding: 10px 18px;
      border-radius: 60px;
      border: 1px solid #ffb3c6;
      background: white;
      font-size: 0.95rem;
      outline: none;
    }

    .upload-card input[type="text"]:focus {
      border-color: #d63384;
      box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.2);
    }

    .upload-card button {
      background: #d63384;
      border: none;
      color: white;
      font-weight: bold;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .upload-card button:hover {
      background: #b82d6a;
      transform: scale(0.97);
    }

    .upload-card button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 26px;
      margin-top: 30px;
      margin-bottom: 40px;
    }

    .memory {
      background: white;
      border-radius: 32px;
      padding: 16px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(214, 51, 132, 0.2);
    }

    .memory:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 35px rgba(214, 51, 132, 0.2);
    }

    .img-wrapper {
      width: 100%;
      height: 250px;
      overflow: hidden;
      border-radius: 24px;
      background: #ffe2ed;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .memory img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .memory:hover img {
      transform: scale(1.03);
    }

    .memory p {
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 500;
      color: #2c1a24;
      background: #fff0f7;
      padding: 10px 12px;
      border-radius: 30px;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .caption-text {
      flex: 1;
      text-align: left;
    }

    .memory small {
      font-size: 0.7rem;
      color: #d63384;
      background: #ffeef4;
      padding: 3px 10px;
      border-radius: 30px;
    }

    .delete-btn {
      background: #ffe2ed;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background: #ffb7cb;
      transform: scale(1.08);
    }

    .back-home {
      text-decoration: none;
      color: white;
      background: #d63384;
      padding: 12px 28px;
      border-radius: 50px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.2s;
    }

    .back-home:hover {
      background: #a12962;
      transform: scale(0.97);
    }

    .toast-message {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d1a24e6;
      backdrop-filter: blur(12px);
      color: #ffecf0;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      z-index: 999;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ffc0d0;
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .upload-card {
        flex-direction: column;
        align-items: stretch;
      }
      .gallery {
        gap: 18px;
      }
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>💌 Our Beautiful Memories 💌</h1>
  <div class="subhead">💑 Every moment with you is magic 💖</div>

  <div class="upload-card">
    <input type="file" id="uploadPic" accept="image/jpeg,image/png,image/jpg,image/gif,image/webp">
    <input type="text" id="caption" placeholder="Write a sweet caption 💕" autocomplete="off">
    <button id="uploadBtn">📸 Upload to Cloud</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <a href="#" class="back-home" id="homeLink">⬅ Back Home</a>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  // ========== SUPABASE CONFIGURATION ==========
  // IMPORTANT: You need to replace these with your actual Supabase credentials!
  // Go to your Supabase project -> Settings -> API
  const supabaseUrl = "https://YOUR_PROJECT.supabase.co";  // Replace with your URL
  const supabaseKey = "YOUR_ANON_KEY";  // Replace with your anon/public key
  
  // Initialize Supabase client
  const supabase = createClient(supabaseUrl, supabaseKey);
  
  // Bucket name for storing images (must be created in Supabase Storage)
  const STORAGE_BUCKET = "memories";
  
  // Table name for memories metadata
  const TABLE_NAME = "memories";

  // Default seeded memories (using public placeholder images)
  const DEFAULT_MEMORIES = [
    { id: 'default1', url: 'https://picsum.photos/id/20/400/300', caption: 'AWW 💕', author: 'Shosho', created_at: new Date(Date.now() - 86400000).toISOString() },
    { id: 'default2', url: 'https://picsum.photos/id/30/400/300', caption: 'OH BABY', author: 'Babe', created_at: new Date(Date.now() - 86000000).toISOString() },
    { id: 'default3', url: 'https://picsum.photos/id/42/400/300', caption: '💕 Sweet moments', author: 'Us', created_at: new Date(Date.now() - 85000000).toISOString() },
    { id: 'default4', url: 'https://picsum.photos/id/58/400/300', caption: '😊 Together forever', author: 'You & me', created_at: new Date(Date.now() - 84000000).toISOString() },
    { id: 'default5', url: 'https://picsum.photos/id/60/400/300', caption: 'HIS CLOTHES LOOK GOOD ON ME OHH 😝💖', author: 'Her', created_at: new Date(Date.now() - 83000000).toISOString() },
    { id: 'default6', url: 'https://picsum.photos/id/64/400/300', caption: '😍 Love you!', author: 'Him', created_at: new Date(Date.now() - 82000000).toISOString() },
    { id: 'default7', url: 'https://picsum.photos/id/69/400/300', caption: 'HER FAVOURITE PIC 💖', author: 'Him', created_at: new Date(Date.now() - 81000000).toISOString() },
    { id: 'default8', url: 'https://picsum.photos/id/89/400/300', caption: 'HIS FAVOURITE PIC 💖', author: 'Her', created_at: new Date(Date.now() - 80000000).toISOString() }
  ];

  // Show toast notification
  function showToast(message, duration = 2500) {
    let toast = document.querySelector('.toast-message');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast-message';
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, duration);
  }

  // Load memories from Supabase
  async function loadMemoriesFromSupabase() {
    try {
      // First, check if we have any memories in the database
      const { data: existingMemories, error: fetchError } = await supabase
        .from(TABLE_NAME)
        .select('*')
        .order('created_at', { ascending: false });
      
      if (fetchError) {
        console.error('Error fetching memories:', fetchError);
        // If table doesn't exist or error, use defaults
        return DEFAULT_MEMORIES;
      }
      
      // If no memories exist, seed the default ones
      if (!existingMemories || existingMemories.length === 0) {
        console.log('No memories found, seeding defaults...');
        const { error: insertError } = await supabase
          .from(TABLE_NAME)
          .insert(DEFAULT_MEMORIES.map(m => ({
            id: m.id,
            url: m.url,
            caption: m.caption,
            author: m.author,
            created_at: m.created_at
          })));
        
        if (insertError) {
          console.error('Error seeding default memories:', insertError);
          return DEFAULT_MEMORIES;
        }
        
        return DEFAULT_MEMORIES;
      }
      
      return existingMemories;
    } catch (error) {
      console.error('Error in loadMemoriesFromSupabase:', error);
      return DEFAULT_MEMORIES;
    }
  }

  // Render gallery from Supabase data
  async function renderGallery() {
    const galleryDiv = document.getElementById('gallery');
    if (!galleryDiv) return;
    
    galleryDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loader"></div> Loading memories... 💕</div>';
    
    const memories = await loadMemoriesFromSupabase();
    
    if (!memories || memories.length === 0) {
      galleryDiv.innerHTML = `<div style="background: #ffeef4; border-radius: 48px; padding: 60px 20px; color: #a13e6b; font-size: 1.2rem;">✨ No memories yet? Upload your first sweet moment ✨</div>`;
      return;
    }
    
    galleryDiv.innerHTML = '';
    
    for (const mem of memories) {
      const memoryDiv = document.createElement('div');
      memoryDiv.className = 'memory';
      
      // Only allow deletion of non-default memories (custom uploaded ones)
      const isDeletable = !mem.id || !mem.id.startsWith('default');
      const deleteBtnHtml = isDeletable ? `<button class="delete-btn" data-id="${mem.id}" data-url="${mem.url}" title="remove memory">🗑️</button>` : '';
      
      memoryDiv.innerHTML = `
        <div class="img-wrapper">
          <img src="${mem.url}" alt="memory" onerror="this.src='https://placehold.co/400x300/ffd9e6/d63384?text=❤️+Memory'">
        </div>
        <p>
          <span class="caption-text">${escapeHtml(mem.caption)} <small>${escapeHtml(mem.author || 'Shosho & Babe')}</small></span>
          ${deleteBtnHtml}
        </p>
      `;
      
      galleryDiv.appendChild(memoryDiv);
    }
    
    // Attach delete events
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const url = btn.getAttribute('data-url');
        if (id && !id.startsWith('default')) {
          await deleteMemoryFromSupabase(id, url);
        } else {
          showToast("✨ Core memories are forever ✨", 1800);
        }
      });
    });
  }
  
  // Delete memory from Supabase
  async function deleteMemoryFromSupabase(id, imageUrl) {
    try {
      // Delete from database
      const { error: dbError } = await supabase
        .from(TABLE_NAME)
        .delete()
        .eq('id', id);
      
      if (dbError) {
        console.error('Error deleting from database:', dbError);
        showToast("Failed to delete memory 😢", 2000);
        return;
      }
      
      // Try to extract filename from URL and delete from storage
      if (imageUrl && imageUrl.includes('/storage/v1/object/public/')) {
        const pathParts = imageUrl.split('/storage/v1/object/public/memories/');
        if (pathParts.length > 1) {
          const filePath = pathParts[1];
          const { error: storageError } = await supabase.storage
            .from(STORAGE_BUCKET)
            .remove([filePath]);
          
          if (storageError) {
            console.warn('Could not delete from storage:', storageError);
          }
        }
      }
      
      showToast("Memory removed 💔", 2000);
      renderGallery(); // Refresh the gallery
      
    } catch (error) {
      console.error('Error deleting memory:', error);
      showToast("Failed to delete memory 😢", 2000);
    }
  }

  // Upload new memory to Supabase
  async function handleUpload() {
    const fileInput = document.getElementById('uploadPic');
    const captionInput = document.getElementById('caption');
    const file = fileInput.files[0];
    const caption = captionInput.value.trim();
    
    if (!file) {
      showToast("📸 Please select a picture first! 💕", 2000);
      return;
    }
    
    if (!file.type.startsWith('image/')) {
      showToast("Only images are allowed 🖼️", 2000);
      return;
    }
    
    if (file.size > 10 * 1024 * 1024) {
      showToast("Image is too large! Please choose under 10MB 💖", 2500);
      return;
    }
    
    const uploadBtn = document.getElementById('uploadBtn');
    const originalText = uploadBtn.innerHTML;
    uploadBtn.innerHTML = 'Uploading to cloud ☁️ <span class="loader"></span>';
    uploadBtn.disabled = true;
    
    try {
      // Generate unique filename
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
      const filePath = `uploads/${fileName}`;
      
      // Upload to Supabase Storage bucket
      const { data: uploadData, error: uploadError } = await supabase.storage
        .from(STORAGE_BUCKET)
        .upload(filePath, file);
      
      if (uploadError) {
        console.error('Storage upload error:', uploadError);
        showToast("Upload failed: " + uploadError.message, 3000);
        return;
      }
      
      // Get public URL
      const { data: publicUrlData } = supabase.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(filePath);
      
      const publicUrl = publicUrlData.publicUrl;
      
      // Insert metadata into database
      const newMemory = {
        id: `user_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
        url: publicUrl,
        caption: caption || '✨ Our beautiful memory ✨',
        author: "Shosho & Babe 💑",
        created_at: new Date().toISOString()
      };
      
      const { error: dbError } = await supabase
        .from(TABLE_NAME)
        .insert([newMemory]);
      
      if (dbError) {
        console.error('Database insert error:', dbError);
        showToast("Saved to storage but failed to save metadata 😢", 3000);
        return;
      }
      
      // Clear inputs
      fileInput.value = '';
      captionInput.value = '';
      
      showToast("🎉 Memory saved to cloud! Forever in our hearts 💖", 2500);
      renderGallery(); // Refresh the gallery
      
    } catch (err) {
      console.error('Upload error:', err);
      showToast("😢 Upload failed. Please check your Supabase configuration.", 3000);
    } finally {
      uploadBtn.innerHTML = originalText;
      uploadBtn.disabled = false;
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Setup event listeners
  function setupEventListeners() {
    const uploadBtn = document.getElementById('uploadBtn');
    if (uploadBtn) uploadBtn.addEventListener('click', handleUpload);
    
    const homeLink = document.getElementById('homeLink');
    if (homeLink) {
      homeLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = "index.html";
      });
    }
    
    const captionField = document.getElementById('caption');
    if (captionField) {
      captionField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUpload();
      });
    }
  }
  
  // Initialize
  async function init() {
    setupEventListeners();
    await renderGallery();
    
    // Check Supabase connection
    try {
      const { data, error } = await supabase.from(TABLE_NAME).select('count', { count: 'exact', head: true });
      if (error) {
        console.warn('Supabase connection issue:', error);
        showToast("⚠️ Using local mode. Connect Supabase for cloud storage.", 3000);
      } else {
        console.log('✅ Supabase connected successfully!');
      }
    } catch (e) {
      console.warn('Supabase not configured:', e);
    }
  }
  
  init();
</script>
</body>
</html>
