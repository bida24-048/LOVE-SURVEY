<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 💕</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff0f5;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #d63384; margin-bottom: 20px; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .memory {
      background: #ffe6f0;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      position: relative;
      cursor: pointer;
    }
    .memory:hover { transform: scale(1.05); }
    .memory img {
      width: 100%;
      border-radius: 15px;
      height: 200px;
      object-fit: cover;
      cursor: pointer;
    }
    .memory p {
      margin-top: 10px;
      font-size: 16px;
      color: #444;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(214, 51, 132, 0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      z-index: 10;
    }
    .memory:hover .delete-btn {
      display: flex;
    }
    .delete-btn:hover {
      background: #d63384;
      transform: scale(1.1);
    }
    a {
      text-decoration: none;
      color: white;
      background: #d63384;
      padding: 10px 20px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 30px;
    }
    a:hover { background: #b82d6a; }
    .upload-section {
      margin: 20px auto;
      padding: 20px;
      background: #ffe6f0;
      border-radius: 20px;
      display: inline-block;
    }
    input, button {
      margin: 5px;
      padding: 8px 15px;
      border-radius: 10px;
      border: 1px solid #d63384;
    }
    button {
      background: #d63384;
      color: white;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #b82d6a;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #d63384;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
      z-index: 1000;
    }
    
    /* Lightbox styles for full-size image view */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
      cursor: pointer;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    .lightbox-caption {
      color: white;
      margin-top: 20px;
      font-size: 18px;
      text-align: center;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      max-width: 80%;
    }
    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .close-lightbox:hover {
      color: #d63384;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 50px;
      color: white;
      cursor: pointer;
      user-select: none;
      transition: 0.3s;
      background: rgba(0,0,0,0.5);
      padding: 20px 15px;
      border-radius: 10px;
    }
    .lightbox-nav:hover {
      background: rgba(214, 51, 132, 0.7);
    }
    .prev {
      left: 20px;
    }
    .next {
      right: 20px;
    }
    @media (max-width: 600px) {
      .lightbox-nav {
        font-size: 30px;
        padding: 10px 12px;
      }
      .lightbox-caption {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1>💌 Our Beautiful Memories 💌</h1>
  <p>Here are some of our sweetest moments together 💑✨</p>

  <!-- Upload new memory -->
  <div class="upload-section">
    <input type="file" id="uploadPic" accept="image/*" />
    <input type="text" id="caption" placeholder="Add a caption 💖" />
    <button onclick="uploadMemory()">Upload 📸</button>
  </div>

  <div class="gallery" id="gallery">
    <!-- Your original hardcoded memories stay exactly as they were -->
    <div class="memory" data-id="original1" data-img-src="butt.jpg" data-caption="AWW💕">
      <img src="butt.jpg" alt="memory">
      <p>AWW💕</p>
    </div>
    <div class="memory" data-id="original2" data-img-src="hand.jpg" data-caption="OH BABY">
      <img src="hand.jpg" alt="memory">
      <p>OH BABY</p>
    </div>
    <div class="memory" data-id="original3" data-img-src="huh.jpg" data-caption="💕">
      <img src="huh.jpg" alt="memory">
      <p>💕</p>
    </div>
    <div class="memory" data-id="original4" data-img-src="legs.jpg" data-caption="😊📸">
      <img src="legs.jpg" alt="memory">
      <p>😊📸</p>
    </div>
    <div class="memory" data-id="original5" data-img-src="outfit.jpg" data-caption="HIS CLOTHES LOOK GOOD ON ME OHH😝💖">
      <img src="outfit.jpg" alt="memory">
      <p>HIS CLOTHES LOOK GOOD ON ME OHH😝💖</p>
    </div>
    <div class="memory" data-id="original6" data-img-src="call.jpg" data-caption="😍">
      <img src="call.jpg" alt="memory">
      <p>😍</p>
    </div>
    <div class="memory" data-id="original7" data-img-src="bae.jpg" data-caption="HER FAVOURITE PIC💖">
      <img src="bae.jpg" alt="memory">
      <p>HER FAVOURITE PIC💖</p>
    </div>
    <div class="memory" data-id="original8" data-img-src="girl.jpg" data-caption="HIS FAVOURITE PIC💖">
      <img src="girl.jpg" alt="memory">
      <p>HIS FAVOURITE PIC💖</p>
    </div>
  </div>

  <a href="index.html">⬅ Back Home</a>
  <div id="toast" class="toast"></div>

  <!-- Lightbox for full-size images -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-nav prev" onclick="event.stopPropagation(); navigateLightbox(-1)">&#10094;</div>
    <div class="lightbox-nav next" onclick="event.stopPropagation(); navigateLightbox(1)">&#10095;</div>
    <img id="lightbox-img" src="" alt="Full size">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>

  <script>
    // Your original pictures are preserved above!
    // This script adds upload functionality and click-to-view full images
    
    let uploadedMemories = [];
    let allMemories = []; // Store all memories (originals + uploads) for navigation

    // Build all memories array from DOM
    function buildAllMemoriesArray() {
      allMemories = [];
      
      // Add original memories
      const originalMemories = document.querySelectorAll('#gallery .memory:not(.uploaded-memory)');
      originalMemories.forEach(mem => {
        const img = mem.querySelector('img');
        const caption = mem.querySelector('p').innerText;
        allMemories.push({
          id: mem.getAttribute('data-id') || 'original_' + Math.random(),
          url: img.src,
          caption: caption,
          isOriginal: true
        });
      });
      
      // Add uploaded memories
      uploadedMemories.forEach(mem => {
        allMemories.push({
          id: mem.id,
          url: mem.url,
          caption: mem.caption,
          isOriginal: false
        });
      });
    }

    // Load saved uploads from localStorage
    function loadUploadedMemories() {
      const saved = localStorage.getItem('uploadedMemories');
      if (saved) {
        uploadedMemories = JSON.parse(saved);
        displayUploadedMemories();
      }
      buildAllMemoriesArray();
    }

    // Save uploaded memories to localStorage
    function saveUploadedMemories() {
      localStorage.setItem('uploadedMemories', JSON.stringify(uploadedMemories));
      buildAllMemoriesArray();
    }

    // Display only uploaded memories (appended after originals)
    function displayUploadedMemories() {
      const gallery = document.getElementById('gallery');
      // Remove any existing uploaded memories (keep originals)
      const existingUploads = gallery.querySelectorAll('.uploaded-memory');
      existingUploads.forEach(el => el.remove());
      
      // Add uploaded memories
      uploadedMemories.forEach((mem, index) => {
        const memoryDiv = document.createElement('div');
        memoryDiv.className = 'memory uploaded-memory';
        memoryDiv.setAttribute('data-upload-id', mem.id);
        memoryDiv.setAttribute('data-img-src', mem.url);
        memoryDiv.setAttribute('data-caption', mem.caption);
        memoryDiv.innerHTML = `
          <img src="${mem.url}" alt="uploaded memory">
          <p>${escapeHtml(mem.caption)} — Shosho 💕</p>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteUploadedMemory('${mem.id}')">×</button>
        `;
        gallery.appendChild(memoryDiv);
      });
      
      // Re-attach click handlers to new images
      attachImageClickHandlers();
      buildAllMemoriesArray();
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Delete uploaded memory
    window.deleteUploadedMemory = function(id) {
      event.stopPropagation();
      uploadedMemories = uploadedMemories.filter(mem => mem.id !== id);
      saveUploadedMemories();
      displayUploadedMemories();
      showToast("Memory deleted 💔");
    }

    // Show toast message
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 2000);
    }

    // Convert file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Upload memory function
    window.uploadMemory = async function() {
      const fileInput = document.getElementById('uploadPic');
      const captionInput = document.getElementById('caption');
      const file = fileInput.files[0];
      const caption = captionInput.value.trim();
      
      if (!file) {
        showToast("Please select a picture first! 📸");
        return;
      }
      
      if (!file.type.startsWith('image/')) {
        showToast("Please select an image file! 🖼️");
        return;
      }
      
      if (file.size > 5 * 1024 * 1024) {
        showToast("Image is too large! Please choose under 5MB 💖");
        return;
      }
      
      const uploadBtn = event.target;
      const originalText = uploadBtn.innerHTML;
      uploadBtn.innerHTML = 'Uploading... 🌸';
      uploadBtn.disabled = true;
      
      try {
        const base64Image = await fileToBase64(file);
        const newMemory = {
          id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
          url: base64Image,
          caption: caption || '✨ Our beautiful memory ✨',
          createdAt: Date.now()
        };
        
        uploadedMemories.unshift(newMemory); // Add to beginning
        saveUploadedMemories();
        displayUploadedMemories();
        
        // Clear inputs
        fileInput.value = '';
        captionInput.value = '';
        
        showToast("Memory uploaded successfully! 💖");
      } catch (err) {
        console.error('Upload error:', err);
        showToast("Upload failed. Please try again! 😢");
      } finally {
        uploadBtn.innerHTML = originalText;
        uploadBtn.disabled = false;
      }
    }

    // LIGHTBOX FUNCTIONALITY
    let currentImageIndex = 0;
    
    function openLightbox(index) {
      if (!allMemories.length) return;
      currentImageIndex = index;
      const memory = allMemories[currentImageIndex];
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxCaption = document.getElementById('lightbox-caption');
      
      lightboxImg.src = memory.url;
      lightboxCaption.innerHTML = memory.caption + (memory.isOriginal ? '' : ' — Shosho 💕');
      lightbox.classList.add('active');
    }
    
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.getElementById('lightbox-img').src = '';
    }
    
    function navigateLightbox(direction) {
      let newIndex = currentImageIndex + direction;
      if (newIndex < 0) newIndex = allMemories.length - 1;
      if (newIndex >= allMemories.length) newIndex = 0;
      
      currentImageIndex = newIndex;
      const memory = allMemories[currentImageIndex];
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxCaption = document.getElementById('lightbox-caption');
      
      lightboxImg.src = memory.url;
      lightboxCaption.innerHTML = memory.caption + (memory.isOriginal ? '' : ' — Shosho 💕');
    }
    
    // Attach click handlers to all images in the gallery
    function attachImageClickHandlers() {
      const memories = document.querySelectorAll('#gallery .memory');
      memories.forEach((memory, idx) => {
        // Remove any existing listener to avoid duplicates
        const img = memory.querySelector('img');
        if (img) {
          img.removeEventListener('click', handleImageClick);
          img.addEventListener('click', (e) => {
            e.stopPropagation();
            // Find the index of this memory in allMemories
            const imgSrc = img.src;
            const caption = memory.querySelector('p').innerText;
            const index = allMemories.findIndex(m => m.url === imgSrc || (m.caption === caption && m.url === imgSrc));
            if (index !== -1) {
              openLightbox(index);
            } else {
              // Fallback: rebuild array and try again
              buildAllMemoriesArray();
              const newIndex = allMemories.findIndex(m => m.url === imgSrc);
              if (newIndex !== -1) openLightbox(newIndex);
              else openLightbox(0);
            }
          });
        }
      });
    }
    
    function handleImageClick(e) {
      // This is handled by the inline event listener above
    }
    
    // Close lightbox with Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('active')) {
        closeLightbox();
      }
    });
    
    // Add delete protection for original memories
    function addDeleteProtection() {
      const originalMemories = document.querySelectorAll('.memory:not(.uploaded-memory)');
      originalMemories.forEach(mem => {
        // Add a protected delete button that shows they're protected
        const protectBtn = document.createElement('button');
        protectBtn.className = 'delete-btn';
        protectBtn.innerHTML = '🔒';
        protectBtn.style.background = '#ccc';
        protectBtn.style.cursor = 'default';
        protectBtn.onclick = (e) => {
          e.stopPropagation();
          showToast("✨ Original memories are forever! ✨");
        };
        mem.appendChild(protectBtn);
      });
    }
    
    // Initialize
    function init() {
      loadUploadedMemories();
      attachImageClickHandlers();
      addDeleteProtection();
    }
    
    // Run init when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
  </html>
