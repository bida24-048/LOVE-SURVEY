<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 💕</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff0f5;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #d63384; margin-bottom: 20px; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .memory {
      background: #ffe6f0;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      position: relative;
    }
    .memory:hover { transform: scale(1.05); }
    .memory img {
      width: 100%;
      border-radius: 15px;
      height: 200px;
      object-fit: cover;
    }
    .memory p {
      margin-top: 10px;
      font-size: 16px;
      color: #444;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(214, 51, 132, 0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .memory:hover .delete-btn {
      display: flex;
    }
    .delete-btn:hover {
      background: #d63384;
      transform: scale(1.1);
    }
    a {
      text-decoration: none;
      color: white;
      background: #d63384;
      padding: 10px 20px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 30px;
    }
    a:hover { background: #b82d6a; }
    .upload-section {
      margin: 20px auto;
      padding: 20px;
      background: #ffe6f0;
      border-radius: 20px;
      display: inline-block;
    }
    input, button {
      margin: 5px;
      padding: 8px 15px;
      border-radius: 10px;
      border: 1px solid #d63384;
    }
    button {
      background: #d63384;
      color: white;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #b82d6a;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #d63384;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>💌 Our Beautiful Memories 💌</h1>
  <p>Here are some of our sweetest moments together 💑✨</p>

  <!-- Upload new memory -->
  <div class="upload-section">
    <input type="file" id="uploadPic" accept="image/*" />
    <input type="text" id="caption" placeholder="Add a caption 💖" />
    <button onclick="uploadMemory()">Upload 📸</button>
  </div>

  <div class="gallery" id="gallery">
    <!-- Your original hardcoded memories stay exactly as they were -->
    <div class="memory" data-id="original1"><img src="butt.jpg" alt="memory"><p>AWW💕</p></div>
    <div class="memory" data-id="original2"><img src="hand.jpg" alt="memory"><p>OH BABY</p></div>
    <div class="memory" data-id="original3"><img src="huh.jpg" alt="memory"><p>💕</p></div>
    <div class="memory" data-id="original4"><img src="legs.jpg" alt="memory"><p>😊📸</p></div>
    <div class="memory" data-id="original5"><img src="outfit.jpg" alt="memory"><p>HIS CLOTHES LOOK GOOD ON ME OHH😝💖</p></div>
    <div class="memory" data-id="original6"><img src="call.jpg" alt="memory"><p>😍</p></div>
    <div class="memory" data-id="original7"><img src="bae.jpg" alt="memory"><p>HER FAVOURITE PIC💖</p></div>
    <div class="memory" data-id="original8"><img src="girl.jpg" alt="memory"><p>HIS FAVOURITE PIC💖</p></div>
  </div>

  <a href="index.html">⬅ Back Home</a>
  <div id="toast" class="toast"></div>

  <script>
    // Your original pictures are preserved above!
    // This script adds upload functionality while keeping your original images intact
    
    let uploadedMemories = [];

    // Load saved uploads from localStorage
    function loadUploadedMemories() {
      const saved = localStorage.getItem('uploadedMemories');
      if (saved) {
        uploadedMemories = JSON.parse(saved);
        displayUploadedMemories();
      }
    }

    // Save uploaded memories to localStorage
    function saveUploadedMemories() {
      localStorage.setItem('uploadedMemories', JSON.stringify(uploadedMemories));
    }

    // Display only uploaded memories (appended after originals)
    function displayUploadedMemories() {
      const gallery = document.getElementById('gallery');
      // Remove any existing uploaded memories (keep originals)
      const existingUploads = gallery.querySelectorAll('.uploaded-memory');
      existingUploads.forEach(el => el.remove());
      
      // Add uploaded memories
      uploadedMemories.forEach((mem, index) => {
        const memoryDiv = document.createElement('div');
        memoryDiv.className = 'memory uploaded-memory';
        memoryDiv.setAttribute('data-upload-id', mem.id);
        memoryDiv.innerHTML = `
          <img src="${mem.url}" alt="uploaded memory">
          <p>${mem.caption} — Shosho 💕</p>
          <button class="delete-btn" onclick="deleteUploadedMemory('${mem.id}')">×</button>
        `;
        gallery.appendChild(memoryDiv);
      });
    }

    // Delete uploaded memory
    window.deleteUploadedMemory = function(id) {
      uploadedMemories = uploadedMemories.filter(mem => mem.id !== id);
      saveUploadedMemories();
      displayUploadedMemories();
      showToast("Memory deleted 💔");
    }

    // Show toast message
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 2000);
    }

    // Convert file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Upload memory function
    window.uploadMemory = async function() {
      const fileInput = document.getElementById('uploadPic');
      const captionInput = document.getElementById('caption');
      const file = fileInput.files[0];
      const caption = captionInput.value.trim();
      
      if (!file) {
        showToast("Please select a picture first! 📸");
        return;
      }
      
      if (!file.type.startsWith('image/')) {
        showToast("Please select an image file! 🖼️");
        return;
      }
      
      if (file.size > 5 * 1024 * 1024) {
        showToast("Image is too large! Please choose under 5MB 💖");
        return;
      }
      
      const uploadBtn = event.target;
      const originalText = uploadBtn.innerHTML;
      uploadBtn.innerHTML = 'Uploading... 🌸';
      uploadBtn.disabled = true;
      
      try {
        const base64Image = await fileToBase64(file);
        const newMemory = {
          id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
          url: base64Image,
          caption: caption || '✨ Our beautiful memory ✨',
          createdAt: Date.now()
        };
        
        uploadedMemories.unshift(newMemory); // Add to beginning
        saveUploadedMemories();
        displayUploadedMemories();
        
        // Clear inputs
        fileInput.value = '';
        captionInput.value = '';
        
        showToast("Memory uploaded successfully! 💖");
      } catch (err) {
        console.error('Upload error:', err);
        showToast("Upload failed. Please try again! 😢");
      } finally {
        uploadBtn.innerHTML = originalText;
        uploadBtn.disabled = false;
      }
    }

    // Load saved uploads on page load
    loadUploadedMemories();
    
    // Add delete buttons to original memories (optional - for completeness)
    // But we'll keep original ones protected by default
    function addDeleteProtection() {
      const originalMemories = document.querySelectorAll('.memory:not(.uploaded-memory)');
      originalMemories.forEach(mem => {
        // Add a disabled delete button that shows they're protected
        const protectBtn = document.createElement('button');
        protectBtn.className = 'delete-btn';
        protectBtn.innerHTML = '🔒';
        protectBtn.style.background = '#ccc';
        protectBtn.style.cursor = 'default';
        protectBtn.onclick = () => showToast("✨ Original memories are forever! ✨");
        mem.appendChild(protectBtn);
      });
    }
    
    // Small delay to ensure DOM is ready
    setTimeout(addDeleteProtection, 100);
  </script>
</body>
</html>
