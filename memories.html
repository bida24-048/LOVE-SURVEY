<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories Gallery 💕 | Sweet Moments</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
      background: linear-gradient(145deg, #fff5f9 0%, #ffe4ed 100%);
      text-align: center;
      margin: 0;
      padding: 30px 20px 60px;
      min-height: 100vh;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    h1 {
      color: #d63384;
      font-size: 2.5rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .subhead {
      font-size: 1.2rem;
      color: #a13e6b;
      background: #fff0f5dd;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 40px;
      margin-bottom: 30px;
    }

    .upload-card {
      background: white;
      max-width: 700px;
      margin: 10px auto 30px auto;
      padding: 20px 25px;
      border-radius: 48px;
      box-shadow: 0 12px 28px rgba(214, 51, 132, 0.2);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 14px;
      background: rgba(255, 248, 251, 0.95);
      border: 1px solid #ffc0d0;
    }

    .upload-card input[type="file"] {
      background: #ffeef4;
      border: 1px solid #d63384;
      border-radius: 60px;
      padding: 10px 18px;
      font-size: 0.9rem;
      color: #a12962;
      cursor: pointer;
      flex: 2;
      min-width: 180px;
    }

    .upload-card input[type="text"] {
      flex: 2;
      padding: 10px 18px;
      border-radius: 60px;
      border: 1px solid #ffb3c6;
      background: white;
      font-size: 0.95rem;
      outline: none;
    }

    .upload-card input[type="text"]:focus {
      border-color: #d63384;
      box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.2);
    }

    .upload-card button {
      background: #d63384;
      border: none;
      color: white;
      font-weight: bold;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .upload-card button:hover {
      background: #b82d6a;
      transform: scale(0.97);
    }

    .upload-card button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 26px;
      margin-top: 30px;
      margin-bottom: 40px;
    }

    .memory {
      background: white;
      border-radius: 32px;
      padding: 16px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(214, 51, 132, 0.2);
    }

    .memory:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 35px rgba(214, 51, 132, 0.2);
    }

    .img-wrapper {
      width: 100%;
      height: 250px;
      overflow: hidden;
      border-radius: 24px;
      background: #ffe2ed;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .memory img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .memory:hover img {
      transform: scale(1.03);
    }

    .memory p {
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 500;
      color: #2c1a24;
      background: #fff0f7;
      padding: 10px 12px;
      border-radius: 30px;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .caption-text {
      flex: 1;
      text-align: left;
    }

    .memory small {
      font-size: 0.7rem;
      color: #d63384;
      background: #ffeef4;
      padding: 3px 10px;
      border-radius: 30px;
    }

    .delete-btn {
      background: #ffe2ed;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background: #ffb7cb;
      transform: scale(1.08);
    }

    .back-home {
      text-decoration: none;
      color: white;
      background: #d63384;
      padding: 12px 28px;
      border-radius: 50px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.2s;
    }

    .back-home:hover {
      background: #a12962;
      transform: scale(0.97);
    }

    .toast-message {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d1a24e6;
      backdrop-filter: blur(12px);
      color: #ffecf0;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      z-index: 999;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ffc0d0;
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .upload-card {
        flex-direction: column;
        align-items: stretch;
      }
      .gallery {
        gap: 18px;
      }
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>💌 Our Beautiful Memories 💌</h1>
  <div class="subhead">💑 Every moment with you is magic 💖</div>

  <div class="upload-card">
    <input type="file" id="uploadPic" accept="image/jpeg,image/png,image/jpg,image/gif,image/webp">
    <input type="text" id="caption" placeholder="Write a sweet caption 💕" autocomplete="off">
    <button id="uploadBtn">📸 Upload Memory</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <a href="#" class="back-home" id="homeLink">⬅ Back Home</a>
</div>

<script>
  // Storage key for memories
  const STORAGE_KEY = 'love_memories_complete';
  
  // Default seeded memories with reliable placeholder images (using unsplash and placehold.co for testing)
  // These are cute placeholder images that will always work
  const DEFAULT_MEMORIES = [
    { id: 'default1', url: 'https://picsum.photos/id/20/400/300', caption: 'AWW 💕', author: 'Shosho', createdAt: Date.now() - 86400000, isDefault: true },
    { id: 'default2', url: 'https://picsum.photos/id/30/400/300', caption: 'OH BABY', author: 'Babe', createdAt: Date.now() - 86000000, isDefault: true },
    { id: 'default3', url: 'https://picsum.photos/id/42/400/300', caption: '💕 Sweet moments', author: 'Us', createdAt: Date.now() - 85000000, isDefault: true },
    { id: 'default4', url: 'https://picsum.photos/id/58/400/300', caption: '😊 Together forever', author: 'You & me', createdAt: Date.now() - 84000000, isDefault: true },
    { id: 'default5', url: 'https://picsum.photos/id/60/400/300', caption: 'HIS CLOTHES LOOK GOOD ON ME OHH 😝💖', author: 'Her', createdAt: Date.now() - 83000000, isDefault: true },
    { id: 'default6', url: 'https://picsum.photos/id/64/400/300', caption: '😍 Love you!', author: 'Him', createdAt: Date.now() - 82000000, isDefault: true },
    { id: 'default7', url: 'https://picsum.photos/id/69/400/300', caption: 'HER FAVOURITE PIC 💖', author: 'Him', createdAt: Date.now() - 81000000, isDefault: true },
    { id: 'default8', url: 'https://picsum.photos/id/89/400/300', caption: 'HIS FAVOURITE PIC 💖', author: 'Her', createdAt: Date.now() - 80000000, isDefault: true }
  ];

  // Load memories from localStorage
  function loadMemories() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed) && parsed.length > 0) {
          return parsed;
        }
      } catch(e) {
        console.warn('Failed to parse stored memories', e);
      }
    }
    // Return fresh copy of default memories
    return DEFAULT_MEMORIES.map(m => ({ ...m }));
  }

  // Save memories to localStorage
  function saveMemories(memories) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
  }

  let allMemories = loadMemories();

  // Show toast notification
  function showToast(message, duration = 2500) {
    let toast = document.querySelector('.toast-message');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast-message';
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, duration);
  }

  // Convert file to data URL with compression for large images
  function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = (e) => reject(e);
      reader.readAsDataURL(file);
    });
  }

  // Compress image if needed (resize to max 800px width to save storage)
  function compressImage(dataUrl, maxWidth = 800) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        if (width > maxWidth) {
          height = (height * maxWidth) / width;
          width = maxWidth;
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Compress as JPEG with 0.8 quality to save space
        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        resolve(compressedDataUrl);
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  // Upload new memory
  async function handleUpload() {
    const fileInput = document.getElementById('uploadPic');
    const captionInput = document.getElementById('caption');
    const file = fileInput.files[0];
    const caption = captionInput.value.trim();
    
    if (!file) {
      showToast("📸 Please select a picture first! 💕", 2000);
      return;
    }
    
    if (!file.type.startsWith('image/')) {
      showToast("Only images are allowed 🖼️", 2000);
      return;
    }
    
    if (file.size > 10 * 1024 * 1024) {
      showToast("Image is too large! Please choose under 10MB 💖", 2500);
      return;
    }
    
    const uploadBtn = document.getElementById('uploadBtn');
    const originalText = uploadBtn.innerHTML;
    uploadBtn.innerHTML = 'Uploading 🌸 <span class="loader"></span>';
    uploadBtn.disabled = true;
    
    try {
      // Convert to data URL
      let dataUrl = await fileToDataURL(file);
      
      // Compress the image
      dataUrl = await compressImage(dataUrl, 800);
      
      const newId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
      const finalCaption = caption === '' ? '✨ Our beautiful memory ✨' : caption;
      
      const newMemory = {
        id: newId,
        url: dataUrl,
        caption: finalCaption,
        author: "Shosho & Babe 💑",
        createdAt: Date.now(),
        isDefault: false
      };
      
      allMemories.push(newMemory);
      saveMemories(allMemories);
      
      // Clear inputs
      fileInput.value = '';
      captionInput.value = '';
      
      renderGallery();
      showToast("🎉 Memory added successfully! Forever in our hearts 💖", 2500);
      
    } catch (err) {
      console.error('Upload error:', err);
      showToast("😢 Upload failed. Please try again with a smaller image.", 3000);
    } finally {
      uploadBtn.innerHTML = originalText;
      uploadBtn.disabled = false;
    }
  }

  // Delete memory (only user-uploaded ones)
  function deleteMemoryById(id) {
    const memory = allMemories.find(m => m.id === id);
    if (!memory) return;
    
    if (memory.isDefault === true) {
      showToast("✨ Core memories are forever ✨", 1800);
      return;
    }
    
    allMemories = allMemories.filter(m => m.id !== id);
    saveMemories(allMemories);
    renderGallery();
    showToast("Memory removed 💔 You can always add new ones!", 2000);
  }

  // Render gallery
  function renderGallery() {
    const galleryDiv = document.getElementById('gallery');
    if (!galleryDiv) return;
    
    const sorted = [...allMemories].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    
    if (sorted.length === 0) {
      galleryDiv.innerHTML = `<div style="background: #ffeef4; border-radius: 48px; padding: 60px 20px; color: #a13e6b; font-size: 1.2rem;">✨ No memories yet? Upload your first sweet moment ✨</div>`;
      return;
    }
    
    galleryDiv.innerHTML = '';
    
    sorted.forEach(mem => {
      const memoryDiv = document.createElement('div');
      memoryDiv.className = 'memory';
      
      const isDeletable = !mem.isDefault;
      const deleteBtnHtml = isDeletable ? `<button class="delete-btn" data-id="${mem.id}" title="remove memory">🗑️</button>` : '';
      
      memoryDiv.innerHTML = `
        <div class="img-wrapper">
          <img src="${mem.url}" alt="memory" onerror="this.src='https://placehold.co/400x300/ffd9e6/d63384?text=❤️+Memory'">
        </div>
        <p>
          <span class="caption-text">${escapeHtml(mem.caption)} <small>${escapeHtml(mem.author)}</small></span>
          ${deleteBtnHtml}
        </p>
      `;
      
      galleryDiv.appendChild(memoryDiv);
    });
    
    // Attach delete events
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (id) deleteMemoryById(id);
      });
    });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Reset to default memories (optional feature)
  function resetToDefaults() {
    if (confirm('Reset to default memories? Your uploaded photos will be lost!')) {
      allMemories = DEFAULT_MEMORIES.map(m => ({ ...m }));
      saveMemories(allMemories);
      renderGallery();
      showToast("✨ Reset to beautiful default memories ✨", 2000);
    }
  }

  // Setup event listeners
  function setupEventListeners() {
    const uploadBtn = document.getElementById('uploadBtn');
    if (uploadBtn) uploadBtn.addEventListener('click', handleUpload);
    
    const homeLink = document.getElementById('homeLink');
    if (homeLink) {
      homeLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = "index.html";
      });
    }
    
    const captionField = document.getElementById('caption');
    if (captionField) {
      captionField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUpload();
      });
    }
    
    // Optional: Add a hidden reset button (double-click title to reset)
    const title = document.querySelector('h1');
    if (title) {
      title.addEventListener('dblclick', () => {
        resetToDefaults();
      });
    }
  }
  
  // Initialize
  function init() {
    renderGallery();
    setupEventListeners();
  }
  
  // Listen for storage changes across tabs
  window.addEventListener('storage', (e) => {
    if (e.key === STORAGE_KEY) {
      allMemories = loadMemories();
      renderGallery();
      showToast("Gallery updated from another tab 💖", 1500);
    }
  });
  
  init();
</script>
</body>
</html>
