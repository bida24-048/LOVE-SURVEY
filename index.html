<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💖 G&L Love World — Login or Register</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Poppins', Roboto, system-ui, sans-serif;
      background: linear-gradient(145deg, #fff9f5 0%, #ffefef 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content: "❤️";
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 38rem;
      color: rgba(179, 0, 0, 0.05);
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 64px;
      box-shadow: 0 25px 45px rgba(179, 0, 0, 0.15), 0 0 0 1px rgba(255, 200, 200, 0.5);
      padding: 2rem 2rem 2.5rem;
      width: 100%;
      max-width: 480px;
      transition: all 0.2s ease;
      z-index: 2;
    }
    h1 {
      font-size: 2.4rem;
      text-align: center;
      color: #b12a2a;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    h1 span {
      font-size: 2rem;
    }
    .sub {
      text-align: center;
      color: #b96f6f;
      margin-bottom: 2rem;
      font-weight: 500;
      border-bottom: 1px dashed #ffcdcd;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 6px;
    }
    .tab-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      background: #fff0f0;
      padding: 8px;
      border-radius: 60px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      color: #a14545;
      font-family: inherit;
    }
    .tab-btn.active {
      background: #b30000;
      color: white;
      box-shadow: 0 6px 14px rgba(179, 0, 0, 0.3);
    }
    .form-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .form-panel.active-panel {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #b14848;
      margin-bottom: 6px;
      margin-left: 10px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 48px;
      border: 1.5px solid #ffcfcf;
      background: #fffcfc;
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
      font-family: inherit;
    }
    .input-group input:focus {
      border-color: #b30000;
      box-shadow: 0 0 0 3px rgba(179, 0, 0, 0.1);
    }
    .secret-hint {
      font-size: 0.7rem;
      text-align: right;
      margin-top: 5px;
      color: #bb7a7a;
    }
    button.primary-btn {
      width: 100%;
      background: #b30000;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(179, 0, 0, 0.3);
    }
    button.primary-btn:hover {
      background: #8f0000;
      transform: scale(0.98);
    }
    .error-msg {
      background: #ffe0e0;
      color: #c0392b;
      padding: 12px;
      border-radius: 40px;
      text-align: center;
      font-size: 0.85rem;
      margin-top: 20px;
      font-weight: 500;
    }
    .footer-love {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #c58a8a;
    }
    .device-badge {
      background: #fff1f1;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 0.7rem;
      display: inline-block;
      width: auto;
      margin-top: 12px;
      color: #b45b5b;
    }
  </style>
</head>
<body>

<div class="glass-card">
  <h1>
    <span>💖</span> G&L Love World <span>✨</span>
  </h1>
  <div style="text-align: center;">
    <div class="sub">where every heartbeat matters</div>
  </div>

  <!-- TABS: Login / Register -->
  <div class="tab-buttons">
    <button class="tab-btn active" id="loginTabBtn">🔐 LOGIN</button>
    <button class="tab-btn" id="registerTabBtn">🌸 REGISTER</button>
  </div>

  <!-- LOGIN PANEL -->
  <div id="loginPanel" class="form-panel active-panel">
    <div class="input-group">
      <label>👤 Username</label>
      <input type="text" id="loginUsername" placeholder="e.g., lily_love" autocomplete="username">
    </div>
    <div class="input-group">
      <label>🔒 Password</label>
      <input type="password" id="loginPassword" placeholder="your secret password">
    </div>
    <div class="input-group">
      <label>🗝️ Secret Code</label>
      <input type="password" id="loginSecret" placeholder="GL2025 or shared code">
      <div class="secret-hint">💞 required: the couple's secret key</div>
    </div>
    <button class="primary-btn" id="doLoginBtn">💖 Login to Vault 💖</button>
    <div id="loginError" class="error-msg" style="display: none;"></div>
  </div>

  <!-- REGISTER PANEL -->
  <div id="registerPanel" class="form-panel">
    <div class="input-group">
      <label>✨ Desired Username</label>
      <input type="text" id="regUsername" placeholder="your love name" autocomplete="off">
    </div>
    <div class="input-group">
      <label>📧 Email (optional)</label>
      <input type="email" id="regEmail" placeholder="sweet@love.com">
    </div>
    <div class="input-group">
      <label>🔐 Create Password</label>
      <input type="password" id="regPassword" placeholder="at least 4 characters">
    </div>
    <div class="input-group">
      <label>🗝️ Secret Code (Global)</label>
      <input type="password" id="regSecret" placeholder="GL2025">
      <div class="secret-hint">🔒 must match couple's secret key</div>
    </div>
    <button class="primary-btn" id="doRegisterBtn">🌸 Create Love Account 🌸</button>
    <div id="registerError" class="error-msg" style="display: none;"></div>
  </div>
  <div class="footer-love">
    💕 Your memories, promises & songs — safe in cloud 💕
    <div class="device-badge" id="deviceInfo"></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
  const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
  const supabase = createClient(supabaseUrl, supabaseKey);

  const GLOBAL_SECRET = "GL2025";   // shared secret code required for both login & register

  // ---------- device & browser detection (for logs) ----------
  function getDeviceName() { 
    const ua = navigator.userAgent; 
    if (/Android/i.test(ua)) return "📱 Android Phone"; 
    if (/iPhone|iPad/i.test(ua)) return "🍏 iPhone / iPad"; 
    if (/Windows/i.test(ua)) return "💻 Windows PC"; 
    if (/Mac/i.test(ua)) return "🍎 Mac"; 
    if (/Linux/i.test(ua)) return "🐧 Linux"; 
    return "✨ Unknown Device"; 
  } 
  function getBrowserName() { 
    const ua = navigator.userAgent; 
    if (ua.includes("Edg")) return "Edge"; 
    if (ua.includes("Chrome")) return "Chrome"; 
    if (ua.includes("Firefox")) return "Firefox"; 
    if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari"; 
    return "Browser"; 
  }

  document.getElementById("deviceInfo").innerHTML = `${getDeviceName()} · ${getBrowserName()}`;

  // ---------- UI Tab Toggle ----------
  const loginTab = document.getElementById("loginTabBtn");
  const registerTab = document.getElementById("registerTabBtn");
  const loginPanel = document.getElementById("loginPanel");
  const registerPanel = document.getElementById("registerPanel");

  function setActiveTab(tab) {
    if (tab === 'login') {
      loginTab.classList.add("active");
      registerTab.classList.remove("active");
      loginPanel.classList.add("active-panel");
      registerPanel.classList.remove("active-panel");
      // clear errors
      document.getElementById("loginError").style.display = "none";
      document.getElementById("registerError").style.display = "none";
    } else {
      registerTab.classList.add("active");
      loginTab.classList.remove("active");
      registerPanel.classList.add("active-panel");
      loginPanel.classList.remove("active-panel");
      document.getElementById("loginError").style.display = "none";
      document.getElementById("registerError").style.display = "none";
    }
  }

  loginTab.addEventListener("click", () => setActiveTab('login'));
  registerTab.addEventListener("click", () => setActiveTab('register'));

  // ---------- Helper: show error inside specific panel ----------
  function showLoginError(msg) {
    const errDiv = document.getElementById("loginError");
    errDiv.innerText = msg;
    errDiv.style.display = "block";
    setTimeout(() => { if(errDiv) errDiv.style.display = "none"; }, 4000);
  }
  function showRegisterError(msg) {
    const errDiv = document.getElementById("registerError");
    errDiv.innerText = msg;
    errDiv.style.display = "block";
    setTimeout(() => { if(errDiv) errDiv.style.display = "none"; }, 4000);
  }

  // ---------- LOGIN logic ----------
  async function loginUser() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const secret = document.getElementById("loginSecret").value;

    if (!username || !password) {
      showLoginError("❌ Please fill username and password.");
      return;
    }
    if (secret !== GLOBAL_SECRET) {
      showLoginError("❌ Invalid Secret Code. Only lovebirds with the right code can enter.");
      return;
    }

    try {
      const { data: user, error } = await supabase
        .from("love_users")
        .select("id, username, email, password")
        .eq("username", username)
        .maybeSingle();

      if (error) throw new Error(error.message);
      if (!user) {
        showLoginError("💔 Username not found. Did you register?");
        return;
      }
      if (user.password !== password) {
        showLoginError("🔐 Wrong password. Try again or use 'Forgot love?' (contact your partner)");
        return;
      }

      // ✅ log login attempt (device & browser)
      await supabase.from("login_logs").insert([{
        user_id: user.id,
        device: getDeviceName(),
        browser: getBrowserName(),
        logged_in_at: new Date().toISOString()
      }]).catch(e => console.warn("log error:", e));

      // ✅ store session
      localStorage.setItem("loveLogin", "true");
      localStorage.setItem("loveUser", user.username);
      localStorage.setItem("loveEmail", user.email || "");
      localStorage.setItem("loveUserId", user.id);

      // Redirect to main Love Vault (home.html — you can change target if needed)
      window.location.href = "home.html";
    } catch (err) {
      console.error(err);
      showLoginError("⚠️ Server error: " + err.message);
    }
  }

  // ---------- REGISTER logic (create brand new account) ----------
  async function registerUser() {
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const secret = document.getElementById("regSecret").value;

    if (!username) {
      showRegisterError("✨ Please choose a lovely username.");
      return;
    }
    if (username.length < 3) {
      showRegisterError("Username must be at least 3 characters.");
      return;
    }
    if (!password || password.length < 4) {
      showRegisterError("🔒 Password should be at least 4 characters.");
      return;
    }
    if (secret !== GLOBAL_SECRET) {
      showRegisterError("❌ Secret code doesn't match the couple's key. Access denied.");
      return;
    }

    try {
      // check if username already exists
      const { data: existing, error: checkError } = await supabase
        .from("love_users")
        .select("username")
        .eq("username", username)
        .maybeSingle();

      if (checkError && checkError.code !== "PGRST116") throw new Error(checkError.message);
      if (existing) {
        showRegisterError("🌸 Username already taken. Try a different love name.");
        return;
      }

      // insert new user
      const { data: newUser, error: insertError } = await supabase
        .from("love_users")
        .insert({
          username: username,
          email: email || null,
          password: password,
          created_at: new Date().toISOString()
        })
        .select()
        .single();

      if (insertError) {
        console.error(insertError);
        if (insertError.code === "23505") showRegisterError("Username already exists. Choose another unique name.");
        else showRegisterError("Registration error: " + insertError.message);
        return;
      }

      // registration success -> auto log them in + store session
      localStorage.setItem("loveLogin", "true");
      localStorage.setItem("loveUser", newUser.username);
      localStorage.setItem("loveEmail", newUser.email || "");
      localStorage.setItem("loveUserId", newUser.id);

      // optional: log the registration event
      await supabase.from("login_logs").insert([{
        user_id: newUser.id,
        device: getDeviceName(),
        browser: getBrowserName(),
        logged_in_at: new Date().toISOString(),
        event_type: "registration"
      }]).catch(e => console.warn("log reg error", e));

      // redirect to home (love vault)
      window.location.href = "home.html";
    } catch (err) {
      console.error(err);
      showRegisterError("💔 Network issue: " + err.message);
    }
  }

  // attach global functions for button handlers
  document.getElementById("doLoginBtn").addEventListener("click", loginUser);
  document.getElementById("doRegisterBtn").addEventListener("click", registerUser);

  // also allow pressing Enter on inputs
  const loginInputs = ["loginUsername", "loginPassword", "loginSecret"];
  loginInputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keypress", (e) => { if(e.key === "Enter") loginUser(); });
  });
  const regInputs = ["regUsername", "regEmail", "regPassword", "regSecret"];
  regInputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keypress", (e) => { if(e.key === "Enter") registerUser(); });
  });

  // prefill secret fields to GL2025 for faster demo (but user can still edit)
  if(document.getElementById("loginSecret")) document.getElementById("loginSecret").value = "GL2025";
  if(document.getElementById("regSecret")) document.getElementById("regSecret").value = "GL2025";
</script>
</body>
</html>
