<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 G&L Love World - Register & Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: white;
  color: #b30000;
  min-height: 100vh;
  position: relative;
  padding: 20px;
}
body::before {
  content: "❤";
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 40rem;
  color: rgba(179,0,0,0.08);
  transform: translate(-50%,-50%);
  z-index: -1;
}
h1 { color:#b30000; margin-top:20px; }
input {
  padding:10px;
  width:70%;
  border-radius:8px;
  border:2px solid #b30000;
  margin-top:10px;
  font-size:16px;
}
button {
  padding:10px 20px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;
}
button:hover {
  background:white;
  color:#b30000;
  border:2px solid #b30000;
}
#error { margin-top:15px; font-weight:bold; color:#b30000; }
</style>
</head>
<body>

<h1>💖 G&L Love World</h1>

<!-- Menu -->
<div id="menuSection">
  <button onclick="showSection('registerSection')">📝 Register</button>
  <button onclick="showSection('loginSection')">🔑 Login</button>
</div>

<hr style="width:60%;margin:30px auto;">

<!-- Registration Form -->
<div id="registerSection" style="display:none;">
  <p>Enter Secret Code to Create Account 💖</p>
  <input type="password" id="registerSecret" placeholder="Secret Code 🔐"><br>
  <input type="text" id="regUsername" placeholder="Username 👤"><br>
  <input type="email" id="regEmail" placeholder="Email 📧"><br>
  <input type="password" id="regPassword" placeholder="Password 🔑"><br>
  <input type="password" id="regConfirmPassword" placeholder="Confirm Password 🔑"><br>
  <button onclick="registerUser()">Create Account 💕</button>
</div>

<!-- Login Form -->
<div id="loginSection" style="display:none;">
  <p>Login to Love World 💌</p>
  <input type="text" id="loginUsername" placeholder="Username 👤"><br>
  <input type="password" id="loginPassword" placeholder="Password 🔑"><br>
  <input type="password" id="loginSecret" placeholder="Secret Code 🔐"><br>
  <button onclick="loginUser()">Login 💖</button>
</div>

<p id="error"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// Supabase details
const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const secretKey = "GL2025";

async function registerUser() {
  const secret = document.getElementById("registerSecret").value;
  const username = document.getElementById("regUsername").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value;
  const confirm = document.getElementById("regConfirmPassword").value;

  if (secret !== secretKey) return showError("❌ Invalid secret code");
  if (!username || !email || !password) return showError("❌ Fill in all fields");
  if (password !== confirm) return showError("❌ Passwords do not match");

  const { data: existing } = await supabase
    .from("love_users")
    .select("id")
    .eq("username", username)
    .maybeSingle();

  if (existing) return showError("❌ Username already exists");

  const { error } = await supabase.from("love_users").insert([
    { username, email, password }
  ]);

  if (error) return showError("❌ " + error.message);

  alert("💖 Account created successfully!");
  showSection("loginSection");
}

async function loginUser() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const secret = document.getElementById("loginSecret").value;

  if (secret !== secretKey) return showError("❌ Invalid secret code");

  const { data: user, error } = await supabase
    .from("love_users")
    .select("*")
    .eq("username", username)
    .eq("password", password)
    .maybeSingle();

  if (error) return showError("❌ " + error.message);
  if (!user) return showError("❌ Invalid username or password");

  // ✅ Capture device info
  const deviceInfo = navigator.userAgent;

  // ✅ Save login log
  await supabase.from("login_logs").insert([{
    user_id: user.id,
    device: deviceInfo,
    logged_in_at: new Date().toISOString()
  }]);

  localStorage.setItem("loveLogin", "true");
  localStorage.setItem("loveUser", user.username);
  localStorage.setItem("loveEmail", user.email);
  localStorage.setItem("loveUserId", user.id);

  window.location.href = "home.html";
}

function showSection(sectionId) {
  document.getElementById("registerSection").style.display = "none";
  document.getElementById("loginSection").style.display = "none";
  document.getElementById(sectionId).style.display = "block";
  document.getElementById("error").innerText = "";
}

function showError(message) {
  document.getElementById("error").innerText = message;
}

window.registerUser = registerUser;
window.loginUser = loginUser;
window.showSection = showSection;
</script>

</body>
</html>
