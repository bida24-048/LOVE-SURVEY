<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 G&L Love World</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#fff5f0,#ffe4e4);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.main-card{
  background:#fff;
  border-radius:40px;
  width:100%;
  max-width:420px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  color:#b30000;
  margin-bottom:10px;
}

.tab-container{
  display:flex;
  margin:15px 0;
  background:#ffeaea;
  border-radius:40px;
  padding:5px;
}

.tab-btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:40px;
  cursor:pointer;
}

.active{
  background:#b30000;
  color:white;
}

.input-field{
  margin:10px 0;
}

input{
  width:100%;
  padding:10px;
  border-radius:30px;
  border:1px solid #ddd;
}

.love-btn{
  width:100%;
  padding:12px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:30px;
  margin-top:10px;
  cursor:pointer;
}

.error{
  color:red;
  text-align:center;
  margin-top:8px;
}

#deviceInfo{
  margin-top:10px;
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="main-card">

<h1>💖 G&L Love World</h1>

<div class="tab-container">
  <button class="tab-btn active" id="loginTab">Login</button>
  <button class="tab-btn" id="registerTab">Register</button>
</div>

<!-- LOGIN -->
<div id="loginPanel">
  <div class="input-field">
    <input type="text" id="loginUsername" placeholder="Username">
  </div>
  <div class="input-field">
    <input type="password" id="loginPassword" placeholder="Password">
  </div>
  <div class="input-field">
    <input type="password" id="loginSecret" placeholder="Secret Code">
  </div>

  <button class="love-btn" id="loginBtn">Login</button>
  <div id="loginError" class="error"></div>
</div>

<!-- REGISTER -->
<div id="registerPanel" style="display:none;">
  <div class="input-field">
    <input type="text" id="regUsername" placeholder="Username">
  </div>
  <div class="input-field">
    <input type="password" id="regPassword" placeholder="Password">
  </div>
  <div class="input-field">
    <input type="password" id="regSecret" placeholder="Secret Code">
  </div>

  <button class="love-btn" id="registerBtn">Register</button>
  <div id="registerError" class="error"></div>
</div>

<div id="deviceInfo"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://wmebpsheblrkuvygguae.supabase.co",
  "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_"
);

const SECRET = "GL2025";

// ✅ DEVICE INFO
function getDevice() {
  const ua = navigator.userAgent;
  if (/Android/i.test(ua)) return "📱 Android";
  if (/iPhone/i.test(ua)) return "🍏 iPhone";
  if (/Windows/i.test(ua)) return "💻 Windows";
  return "✨ Device";
}

function getBrowser() {
  const ua = navigator.userAgent;
  if (ua.includes("Chrome")) return "Chrome";
  if (ua.includes("Firefox")) return "Firefox";
  return "Browser";
}

document.getElementById("deviceInfo").innerText =
  getDevice() + " | " + getBrowser();

// ✅ SWITCH TABS
loginTab.onclick = () => {
  loginPanel.style.display = "block";
  registerPanel.style.display = "none";
  loginTab.classList.add("active");
  registerTab.classList.remove("active");
};

registerTab.onclick = () => {
  registerPanel.style.display = "block";
  loginPanel.style.display = "none";
  registerTab.classList.add("active");
  loginTab.classList.remove("active");
};

// ✅ REDIRECT FUNCTION
function goHome(){
  window.location.href = "home.html";
}

// ✅ LOGIN
loginBtn.onclick = async () => {

  const username = loginUsername.value.trim();
  const password = loginPassword.value;
  const secret = loginSecret.value;

  if(secret !== SECRET){
    loginError.innerText = "Wrong secret code";
    return;
  }

  const { data: user } = await supabase
    .from("love_users")
    .select("*")
    .eq("username", username)
    .maybeSingle();

  if(!user){
    loginError.innerText = "User not found";
    return;
  }

  if(user.password !== password){
    loginError.innerText = "Wrong password";
    return;
  }

  // ✅ save session
  localStorage.setItem("loveLogin", "true");
  localStorage.setItem("loveUser", user.username);
  localStorage.setItem("loveUserId", user.id);

  // ✅ LOG (won’t break login)
  try{
    await supabase.from("login_logs").insert([{
      user_id: user.id,
      device: getDevice(),
      browser: getBrowser(),
      logged_in_at: new Date()
    }]);
  }catch{}

  goHome();
};

// ✅ REGISTER
registerBtn.onclick = async () => {

  const username = regUsername.value.trim();
  const password = regPassword.value;
  const secret = regSecret.value;

  if(secret !== SECRET){
    registerError.innerText = "Wrong secret code";
    return;
  }

  const { data: existing } = await supabase
    .from("love_users")
    .select("username")
    .eq("username", username)
    .maybeSingle();

  if(existing){
    registerError.innerText = "Username taken";
    return;
  }

  const { data: newUser } = await supabase
    .from("love_users")
    .insert({
      username,
      password,
      created_at: new Date()
    })
    .select()
    .single();

  localStorage.setItem("loveLogin", "true");
  localStorage.setItem("loveUser", newUser.username);
  localStorage.setItem("loveUserId", newUser.id);

  // ✅ log
  try{
    await supabase.from("login_logs").insert([{
      user_id: newUser.id,
      device: getDevice(),
      browser: getBrowser(),
      logged_in_at: new Date(),
      event_type: "register"
    }]);
  }catch{}

  goHome();
};
</script>

</body>
</html>
