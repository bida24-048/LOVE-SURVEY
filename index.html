<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 G&L Love World - Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: white;
  color: #b30000;
  min-height: 100vh;
  position: relative;
  padding: 20px;
}
body::before {
  content: "❤";
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 40rem;
  color: rgba(179,0,0,0.08);
  transform: translate(-50%,-50%);
  z-index: -1;
}
h1 { color:#b30000; margin-top:20px; }
input {
  padding:10px;
  width:70%;
  border-radius:8px;
  border:2px solid #b30000;
  margin-top:10px;
  font-size:16px;
}
button {
  padding:10px 20px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;
}
button:hover {
  background:white;
  color:#b30000;
  border:2px solid #b30000;
}
#error { margin-top:15px; font-weight:bold; color:#b30000; }
</style>
</head>
<body>

<h1>💖 G&L Love World</h1>

<!-- Login Form -->
<div id="loginSection">
  <p>Login to Love World 💌</p>
  <input type="text" id="loginUsername" placeholder="Username 👤"><br>
  <input type="password" id="loginPassword" placeholder="Password 🔑"><br>
  <input type="password" id="loginSecret" placeholder="Secret Code 🔐"><br>
  <button onclick="loginUser()">Login 💖</button>
</div>

<p id="error"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// Supabase details
const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const secretKey = "GL2025";

// 🔒 Hidden device detection
function getDeviceName() { 
  const ua = navigator.userAgent; 
  if (/Android/i.test(ua)) return "Android Phone"; 
  if (/iPhone|iPad/i.test(ua)) return "iPhone / iPad"; 
  if (/Windows/i.test(ua)) return "Windows PC"; 
  if (/Mac/i.test(ua)) return "Mac"; 
  if (/Linux/i.test(ua)) return "Linux"; 
  return "Unknown Device"; 
} 

function getBrowserName() { 
  const ua = navigator.userAgent; 
  if (ua.includes("Edg")) return "Edge"; 
  if (ua.includes("Chrome")) return "Chrome"; 
  if (ua.includes("Firefox")) return "Firefox"; 
  if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari"; 
  return "Unknown Browser"; 
}

async function loginUser() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const secret = document.getElementById("loginSecret").value;

  if (secret !== secretKey) return showError("❌ Invalid secret code");

  const { data: user, error } = await supabase
    .from("love_users")
    .select("*")
    .eq("username", username)
    .eq("password", password)
    .maybeSingle();

  if (error) return showError("❌ " + error.message);
  if (!user) return showError("❌ Invalid username or password");

  // ✅ Save login log silently
  await supabase.from("login_logs").insert([{
    user_id: user.id,
    device: getDeviceName(),
    browser: getBrowserName(),
    logged_in_at: new Date().toISOString()
  }]);

  // ✅ Save session
  localStorage.setItem("loveLogin", "true");
  localStorage.setItem("loveUser", user.username);
  localStorage.setItem("loveEmail", user.email);
  localStorage.setItem("loveUserId", user.id);

  window.location.href = "home.html";
}

function showError(message) {
  document.getElementById("error").innerText = message;
}

window.loginUser = loginUser;
</script>

</body>
</html>
