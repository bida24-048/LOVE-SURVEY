<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💖 G&L Love World — Login or Register</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Poppins', Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #fff5f0 0%, #ffe4e4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    body::before {
      content: "❤️";
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 35rem;
      color: rgba(179, 0, 0, 0.06);
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    .main-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 56px;
      box-shadow: 0 30px 50px rgba(179, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      padding: 2rem 1.8rem 2.2rem;
      z-index: 2;
      transition: all 0.3s ease;
    }
    h1 {
      font-size: 2rem;
      text-align: center;
      color: #b12a2a;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .heart-divider {
      text-align: center;
      font-size: 1.2rem;
      color: #e69898;
      margin-bottom: 1.8rem;
      letter-spacing: 4px;
    }
    /* two column layout for login & register side by side */
    .split-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .split-card {
      flex: 1;
      min-width: 200px;
      background: #fffaf8;
      border-radius: 32px;
      padding: 1.4rem 1.2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #ffd9d9;
      transition: all 0.2s;
    }
    .split-card:hover {
      border-color: #ffaaaa;
      box-shadow: 0 8px 20px rgba(179, 0, 0, 0.1);
    }
    .split-card h3 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 1.2rem;
      color: #b33;
      border-bottom: 2px dotted #ffcdcd;
      display: inline-block;
      width: 100%;
    }
    .input-field {
      width: 100%;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }
    .input-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #b55;
      margin-bottom: 5px;
      margin-left: 8px;
    }
    .input-field input {
      padding: 12px 14px;
      border-radius: 40px;
      border: 1.5px solid #ffcdcd;
      background: white;
      font-size: 0.9rem;
      transition: 0.2s;
      outline: none;
    }
    .input-field input:focus {
      border-color: #b30000;
      box-shadow: 0 0 0 2px rgba(179,0,0,0.1);
    }
    .love-btn {
      width: 100%;
      background: #b30000;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
      font-family: inherit;
    }
    .love-btn:hover {
      background: #8f0000;
      transform: scale(0.97);
    }
    .secret-note {
      font-size: 0.65rem;
      text-align: center;
      margin-top: 12px;
      color: #c08383;
      background: #fff0f0;
      padding: 5px;
      border-radius: 30px;
    }
    .error-bubble {
      background: #ffe0e0;
      color: #c0392b;
      padding: 10px;
      border-radius: 50px;
      font-size: 0.75rem;
      margin-top: 12px;
      text-align: center;
      font-weight: 500;
    }
    .footer-love {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: #bb7a7a;
      border-top: 1px solid #ffe0e0;
      padding-top: 16px;
    }
    .device-chip {
      background: #fff1f1;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      margin-top: 8px;
    }
    @media (max-width: 600px) {
      .main-card { padding: 1.5rem; }
      .split-card { padding: 1.2rem; }
      .split-card h3 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="main-card">
  <h1>
    <span>💖</span> G&L Love World <span>✨</span>
  </h1>
  <div class="heart-divider">❤️  where memories live forever  ❤️</div>

  <!-- LOGIN & REGISTER SIDE BY SIDE - BOTH VISIBLE -->
  <div class="split-container">
    
    <!-- LEFT: LOGIN SECTION -->
    <div class="split-card">
      <h3>🔐 LOGIN</h3>
      <div class="input-field">
        <label>👤 Username</label>
        <input type="text" id="loginUsername" placeholder="your love name" autocomplete="username">
      </div>
      <div class="input-field">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="password">
      </div>
      <div class="input-field">
        <label>🗝️ Secret Code</label>
        <input type="password" id="loginSecret" placeholder="required secret key">
      </div>
      <button class="love-btn" id="loginBtn">💖 Enter Love World 💖</button>
      <div id="loginErrorMsg" class="error-bubble" style="display: none;"></div>
    </div>

    <!-- RIGHT: REGISTER SECTION (BRAND NEW ACCOUNT) -->
    <div class="split-card">
      <h3>🌸 REGISTER</h3>
      <div class="input-field">
        <label>✨ Username (new)</label>
        <input type="text" id="regUsername" placeholder="choose unique name">
      </div>
      <div class="input-field">
        <label>📧 Email (optional)</label>
        <input type="email" id="regEmail" placeholder="your@email.com">
      </div>
      <div class="input-field">
        <label>🔐 Create Password</label>
        <input type="password" id="regPassword" placeholder="min 4 characters">
      </div>
      <div class="input-field">
        <label>🗝️ Secret Code</label>
        <input type="password" id="regSecret" placeholder="shared secret key">
      </div>
      <button class="love-btn" id="registerBtn">✨ Create Love Account ✨</button>
      <div id="registerErrorMsg" class="error-bubble" style="display: none;"></div>
    </div>
  </div>
  
  <div class="secret-note">
    💞 Both login & register require the couple's secret code (shared privately)
  </div>
  <div class="footer-love">
    💕 Your promises, plans, songs & questions — encrypted with love 💕
    <div class="device-chip" id="deviceInfo"></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
  const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
  const supabase = createClient(supabaseUrl, supabaseKey);

  const GLOBAL_SECRET = "GL2025";  // kept for verification, but never auto-filled in UI

  // Device detection
  function getDeviceName() { 
    const ua = navigator.userAgent; 
    if (/Android/i.test(ua)) return "📱 Android"; 
    if (/iPhone|iPad/i.test(ua)) return "🍏 iPhone/iPad"; 
    if (/Windows/i.test(ua)) return "💻 Windows"; 
    if (/Mac/i.test(ua)) return "🍎 Mac"; 
    if (/Linux/i.test(ua)) return "🐧 Linux"; 
    return "✨ Device"; 
  } 
  function getBrowserName() { 
    const ua = navigator.userAgent; 
    if (ua.includes("Edg")) return "Edge"; 
    if (ua.includes("Chrome")) return "Chrome"; 
    if (ua.includes("Firefox")) return "Firefox"; 
    if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari"; 
    return "Browser";
  }
  document.getElementById("deviceInfo").innerHTML = `${getDeviceName()} · ${getBrowserName()}`;

  // Error helpers
  function showLoginError(msg) {
    const errDiv = document.getElementById("loginErrorMsg");
    errDiv.innerText = msg;
    errDiv.style.display = "block";
    setTimeout(() => { errDiv.style.display = "none"; }, 4000);
  }
  function showRegisterError(msg) {
    const errDiv = document.getElementById("registerErrorMsg");
    errDiv.innerText = msg;
    errDiv.style.display = "block";
    setTimeout(() => { errDiv.style.display = "none"; }, 4000);
  }

  // ---------- LOGIN (redirects to home.html) ----------
  async function performLogin() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const secret = document.getElementById("loginSecret").value;

    if (!username || !password) {
      showLoginError("❌ Please enter both username and password.");
      return;
    }
    if (!secret) {
      showLoginError("🔐 Secret code is required.");
      return;
    }
    if (secret !== GLOBAL_SECRET) {
      showLoginError("❌ Invalid secret code. Access denied.");
      return;
    }

    try {
      const { data: user, error } = await supabase
        .from("love_users")
        .select("id, username, email, password")
        .eq("username", username)
        .maybeSingle();

      if (error) throw new Error(error.message);
      if (!user) {
        showLoginError("💔 Username not found. Did you register?");
        return;
      }
      if (user.password !== password) {
        showLoginError("🔐 Wrong password. Try again.");
        return;
      }

      // log login
      await supabase.from("login_logs").insert([{
        user_id: user.id,
        device: getDeviceName(),
        browser: getBrowserName(),
        logged_in_at: new Date().toISOString()
      }]).catch(e => console.warn("log error", e));

      // set session
      localStorage.setItem("loveLogin", "true");
      localStorage.setItem("loveUser", user.username);
      localStorage.setItem("loveEmail", user.email || "");
      localStorage.setItem("loveUserId", user.id);

      // ✅ REDIRECT TO home.html (NOT vault)
      window.location.href = "home.html";
    } catch (err) {
      console.error(err);
      showLoginError("⚠️ Server error: " + err.message);
    }
  }

  // ---------- REGISTER (create new account & redirect to home.html) ----------
  async function performRegister() {
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const secret = document.getElementById("regSecret").value;

    if (!username) {
      showRegisterError("✨ Please choose a sweet username.");
      return;
    }
    if (username.length < 3) {
      showRegisterError("Username must be at least 3 characters.");
      return;
    }
    if (!password || password.length < 4) {
      showRegisterError("🔒 Password must be at least 4 characters.");
      return;
    }
    if (!secret) {
      showRegisterError("🗝️ Secret code is required to register.");
      return;
    }
    if (secret !== GLOBAL_SECRET) {
      showRegisterError("❌ Secret code doesn't match the couple's key.");
      return;
    }

    try {
      // check existing username
      const { data: existing, error: checkError } = await supabase
        .from("love_users")
        .select("username")
        .eq("username", username)
        .maybeSingle();

      if (checkError && checkError.code !== "PGRST116") throw new Error(checkError.message);
      if (existing) {
        showRegisterError("🌸 Username already taken. Try another love name.");
        return;
      }

      // create new user
      const { data: newUser, error: insertError } = await supabase
        .from("love_users")
        .insert({
          username: username,
          email: email || null,
          password: password,
          created_at: new Date().toISOString()
        })
        .select()
        .single();

      if (insertError) {
        console.error(insertError);
        if (insertError.code === "23505") showRegisterError("Username already exists.");
        else showRegisterError("Registration error: " + insertError.message);
        return;
      }

      // auto-login after registration
      localStorage.setItem("loveLogin", "true");
      localStorage.setItem("loveUser", newUser.username);
      localStorage.setItem("loveEmail", newUser.email || "");
      localStorage.setItem("loveUserId", newUser.id);

      // log registration event
      await supabase.from("login_logs").insert([{
        user_id: newUser.id,
        device: getDeviceName(),
        browser: getBrowserName(),
        logged_in_at: new Date().toISOString(),
        event_type: "registration"
      }]).catch(e => console.warn("log reg error"));

      // ✅ REDIRECT TO home.html
      window.location.href = "home.html";
    } catch (err) {
      console.error(err);
      showRegisterError("💔 Network issue: " + err.message);
    }
  }

  // attach event listeners
  document.getElementById("loginBtn").addEventListener("click", performLogin);
  document.getElementById("registerBtn").addEventListener("click", performRegister);

  // IMPORTANT: Do NOT prefill secret fields with any value — they remain empty for privacy
  // The user must manually type the secret code (GL2025) themselves.
  // (No auto-fill of secret codes, as requested)

  // Enter key support
  const loginInputs = ["loginUsername", "loginPassword", "loginSecret"];
  loginInputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keypress", (e) => { if(e.key === "Enter") performLogin(); });
  });
  const regInputs = ["regUsername", "regEmail", "regPassword", "regSecret"];
  regInputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keypress", (e) => { if(e.key === "Enter") performRegister(); });
  });
</script>
</body>
</html>
