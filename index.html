<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 G&L Love World</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#fff5f0,#ffe4e4);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.main-card{
  background:#fff;
  border-radius:40px;
  width:100%;
  max-width:420px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  color:#b30000;
  margin-bottom:10px;
}

.tab-container{
  display:flex;
  margin:15px 0;
  background:#ffeaea;
  border-radius:40px;
  padding:5px;
}

.tab-btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:40px;
  cursor:pointer;
  font-weight:600;
  transition:all 0.2s;
}

.tab-btn:hover{
  background:#ffcccc;
}

.active{
  background:#b30000;
  color:white;
}

.input-field{
  margin:10px 0;
}

input{
  width:100%;
  padding:12px;
  border-radius:30px;
  border:1px solid #ddd;
  font-size:14px;
}

.love-btn{
  width:100%;
  padding:12px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:30px;
  margin-top:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  transition:transform 0.1s;
}

.love-btn:hover{
  background:#8b0000;
  transform:scale(0.98);
}

.error{
  color:red;
  text-align:center;
  margin-top:8px;
  font-size:13px;
}

#deviceInfo{
  margin-top:15px;
  text-align:center;
  font-size:12px;
  color:#b65c5c;
  background:#fff5f0;
  padding:8px;
  border-radius:30px;
}
</style>
</head>

<body>

<div class="main-card">

<h1>💖 G&L Love World</h1>

<div class="tab-container">
  <button class="tab-btn active" id="loginTab">Login</button>
  <button class="tab-btn" id="registerTab">Register</button>
</div>

<!-- LOGIN -->
<div id="loginPanel">
  <div class="input-field">
    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
  </div>
  <div class="input-field">
    <input type="password" id="loginPassword" placeholder="Password">
  </div>
  <div class="input-field">
    <input type="password" id="loginSecret" placeholder="Secret Code">
  </div>

  <button class="love-btn" id="loginBtn">🔐 Login</button>
  <div id="loginError" class="error"></div>
</div>

<!-- REGISTER -->
<div id="registerPanel" style="display:none;">
  <div class="input-field">
    <input type="text" id="regUsername" placeholder="Username" autocomplete="off">
  </div>
  <div class="input-field">
    <input type="password" id="regPassword" placeholder="Password">
  </div>
  <div class="input-field">
    <input type="password" id="regSecret" placeholder="Secret Code">
  </div>

  <button class="love-btn" id="registerBtn">✨ Register</button>
  <div id="registerError" class="error"></div>
</div>

<div id="deviceInfo"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://wmebpsheblrkuvygguae.supabase.co",
  "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_"
);

const SECRET = "GL2025";

// =============== DEVICE INFO ===============
function getDevice() {
  const ua = navigator.userAgent;
  if (/iPhone/i.test(ua)) return "📱 iPhone";
  if (/iPad/i.test(ua)) return "📱 iPad";
  if (/Android/i.test(ua)) {
    if (ua.includes("Mobile")) return "🤖 Android Phone";
    return "🤖 Android Tablet";
  }
  if (/Windows/i.test(ua)) {
    if (ua.includes("Phone")) return "📱 Windows Phone";
    return "💻 Windows PC";
  }
  if (/Mac/i.test(ua)) return "🍎 Mac";
  if (/Linux/i.test(ua)) return "🐧 Linux";
  return "✨ Unknown Device";
}

function getBrowser() {
  const ua = navigator.userAgent;
  if (ua.includes("Edg")) return "🔷 Edge";
  if (ua.includes("Chrome") && !ua.includes("Edg")) return "🌐 Chrome";
  if (ua.includes("Firefox")) return "🦊 Firefox";
  if (ua.includes("Safari") && !ua.includes("Chrome")) return "🧭 Safari";
  if (ua.includes("Opera") || ua.includes("OPR")) return "🎭 Opera";
  if (ua.includes("Brave")) return "🦁 Brave";
  return "🌐 " + (navigator.browser || "Browser");
}

function getFullDeviceInfo() {
  return {
    device: getDevice(),
    browser: getBrowser()
  };
}

// Update device info display
function updateDeviceDisplay() {
  const info = getFullDeviceInfo();
  document.getElementById("deviceInfo").innerHTML = `🔌 ${info.device} | ${info.browser}`;
}
updateDeviceDisplay();

// =============== TAB SWITCHING ===============
const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");
const loginPanel = document.getElementById("loginPanel");
const registerPanel = document.getElementById("registerPanel");

loginTab.onclick = () => {
  loginPanel.style.display = "block";
  registerPanel.style.display = "none";
  loginTab.classList.add("active");
  registerTab.classList.remove("active");
};

registerTab.onclick = () => {
  registerPanel.style.display = "block";
  loginPanel.style.display = "none";
  registerTab.classList.add("active");
  loginTab.classList.remove("active");
};

// =============== REDIRECT FUNCTION ===============
function goHome() {
  window.location.href = "home.html";
}

// =============== LOGIN FUNCTION (FIXED) ===============
document.getElementById("loginBtn").onclick = async () => {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const secret = document.getElementById("loginSecret").value;
  const loginError = document.getElementById("loginError");

  if (!username || !password) {
    loginError.innerText = "❌ Please enter username and password";
    return;
  }

  if (secret !== SECRET) {
    loginError.innerText = "❌ Wrong secret code";
    return;
  }

  try {
    const { data: user, error } = await supabase
      .from("love_users")
      .select("*")
      .eq("username", username)
      .maybeSingle();

    if (error) {
      console.error("Supabase error:", error);
      loginError.innerText = "❌ Database error. Please try again.";
      return;
    }

    if (!user) {
      loginError.innerText = "❌ User not found";
      return;
    }

    if (user.password !== password) {
      loginError.innerText = "❌ Wrong password";
      return;
    }

    // Get device info
    const deviceInfo = getFullDeviceInfo();
    const now = new Date().toISOString();

    // ✅ Save session to localStorage
    localStorage.setItem("loveLogin", "true");
    localStorage.setItem("loveUser", user.username);
    localStorage.setItem("loveUserId", user.id);
    localStorage.setItem("loveLastDevice", deviceInfo.device);
    localStorage.setItem("loveLastBrowser", deviceInfo.browser);
    localStorage.setItem("loveLoginTime", now);

    // ✅ CORRECTED: Insert device log with ONLY the fields that exist in your table
    try {
      const { error: logError } = await supabase
        .from("login_logs")
        .insert({
          username: user.username,      // ✅ This matches devices.html query
          device: deviceInfo.device,    // ✅ This matches devices.html query
          browser: deviceInfo.browser,  // ✅ This matches devices.html query
          logged_in_at: now             // ✅ This matches devices.html query
          // ❌ REMOVED: user_id (may not exist in table)
          // ❌ REMOVED: event_type (may not exist in table)
        });

      if (logError) {
        console.error("❌ Login log error:", logError);
        // Show error but don't block login
        loginError.innerText = "⚠️ Login succeeded but device log failed";
        setTimeout(() => { loginError.innerText = ""; }, 3000);
      } else {
        console.log("✅ Login recorded successfully!");
      }
    } catch (logErr) {
      console.warn("Could not save login log:", logErr);
    }

    // ✅ Verify the log was saved (optional but helps debug)
    try {
      const { data: verifyData, error: verifyError } = await supabase
        .from("login_logs")
        .select("*")
        .eq("username", user.username)
        .order("logged_in_at", { ascending: false })
        .limit(1);
      
      if (!verifyError && verifyData && verifyData.length > 0) {
        console.log("✅ Device log verified:", verifyData[0]);
      } else {
        console.warn("⚠️ Device log not found after insert");
      }
    } catch (verifyErr) {
      console.warn("Could not verify log:", verifyErr);
    }

    goHome();

  } catch (err) {
    console.error("Login error:", err);
    loginError.innerText = "❌ Login failed. Check connection.";
  }
};

// =============== REGISTER FUNCTION (FIXED) ===============
document.getElementById("registerBtn").onclick = async () => {
  const username = document.getElementById("regUsername").value.trim();
  const password = document.getElementById("regPassword").value;
  const secret = document.getElementById("regSecret").value;
  const registerError = document.getElementById("registerError");

  if (!username || !password) {
    registerError.innerText = "❌ Please enter username and password";
    return;
  }

  if (username.length < 3) {
    registerError.innerText = "❌ Username must be at least 3 characters";
    return;
  }

  if (secret !== SECRET) {
    registerError.innerText = "❌ Wrong secret code";
    return;
  }

  try {
    // Check if user exists
    const { data: existing } = await supabase
      .from("love_users")
      .select("username")
      .eq("username", username)
      .maybeSingle();

    if (existing) {
      registerError.innerText = "❌ Username already taken";
      return;
    }

    // Create new user
    const { data: newUser, error: insertError } = await supabase
      .from("love_users")
      .insert({
        username: username,
        password: password,
        created_at: new Date().toISOString()
      })
      .select()
      .single();

    if (insertError) {
      console.error("Insert error:", insertError);
      registerError.innerText = "❌ Failed to create account";
      return;
    }

    // Get device info
    const deviceInfo = getFullDeviceInfo();
    const now = new Date().toISOString();

    // Save session
    localStorage.setItem("loveLogin", "true");
    localStorage.setItem("loveUser", newUser.username);
    localStorage.setItem("loveUserId", newUser.id);
    localStorage.setItem("loveLastDevice", deviceInfo.device);
    localStorage.setItem("loveLastBrowser", deviceInfo.browser);
    localStorage.setItem("loveLoginTime", now);

    // ✅ CORRECTED: Record registration as login log
    try {
      const { error: logError } = await supabase
        .from("login_logs")
        .insert({
          username: newUser.username,
          device: deviceInfo.device,
          browser: deviceInfo.browser,
          logged_in_at: now
        });

      if (logError) {
        console.error("❌ Registration log error:", logError);
      } else {
        console.log("✅ Registration recorded successfully!");
      }
    } catch (logErr) {
      console.warn("Could not save registration log:", logErr);
    }

    goHome();

  } catch (err) {
    console.error("Registration error:", err);
    registerError.innerText = "❌ Registration failed. Try again.";
  }
};

// =============== AUTO-LOGIN CHECK ===============
if (localStorage.getItem("loveLogin") === "true") {
  const user = localStorage.getItem("loveUser");
  if (user && user !== "null") {
    window.location.href = "home.html";
  }
}
</script>

</body>
</html>
