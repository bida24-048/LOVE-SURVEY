<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 My Profile</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:white;
    color:#b30000;
    text-align:center;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
}
img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #b30000;
}
textarea,input{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:8px;
    border:2px solid #b30000;
}
button{
    padding:12px 25px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:white;
    color:#b30000;
    border:2px solid #b30000;
}
</style>
</head>
<body>

<div class="container">
<h1>💖 My Love Profile</h1>

<img id="profilePreview" src="https://via.placeholder.com/180"><br><br>

<!-- Supabase fields -->
<p><strong>👤 Username:</strong> <span id="profileUsername"></span></p>
<p><strong>📧 Email:</strong> <span id="profileEmail"></span></p>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://wmebpsheblrkuvygguae.supabase.co";
const supabaseKey = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
const supabase = createClient(supabaseUrl, supabaseKey);

const username = localStorage.getItem("loveUser");
const email = localStorage.getItem("loveEmail");

async function loadProfile(){
  const { data, error } = await supabase
    .from("love_users")
    .select("username,email")
    .eq("username", username)
    .maybeSingle();

  if(error){ console.error(error); }

  // Use Supabase data if found, otherwise fallback to localStorage
  document.getElementById("profileUsername").innerText = data?.username || username || "Unknown";
  document.getElementById("profileEmail").innerText = data?.email || email || "";
</script>
</body>
</html>
